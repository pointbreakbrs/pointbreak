<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point Break — Diagnóstico Firebase</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0f11;font-family:'Segoe UI',sans-serif;color:#f0f0f0;padding:20px;min-height:100vh}
h1{color:#e8a020;font-size:22px;margin-bottom:20px;text-align:center}
.card{background:#1e2127;border:2px solid #2a2d35;border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.status{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#22c55e;animation:pulse 1.5s infinite}
.dot.erro{background:#ef4444}
.dot.wait{background:#e8a020;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.btn{width:100%;background:#e8a020;color:#111;border:none;border-radius:10px;font-size:16px;font-weight:900;padding:14px;cursor:pointer;margin-top:8px;letter-spacing:0.5px}
.btn:hover{background:#f5b83d}
.btn.red{background:#ef4444;color:#fff;margin-top:6px}
.log{background:#12141a;border-radius:8px;padding:12px;font-size:12px;font-family:'Courier New',monospace;color:#4ade80;max-height:200px;overflow-y:auto;margin-top:10px;white-space:pre-wrap}
.pedidos-lista{margin-top:10px}
.pedido-item{background:#12141a;border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px}
.pedido-item .pnum{color:#e8a020;font-weight:900}
.pedido-item .pstatus{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:700;margin-left:8px}
.pstatus.aguardando{background:#1f1008;color:#f97316}
.pstatus.preparo{background:#080e1f;color:#3b82f6}
.pstatus.pronto{background:#071a0e;color:#22c55e}
</style>
</head>
<body>
<h1>🔥 Diagnóstico Firebase</h1>

<div class="card">
  <h3>1. Conexão com Firebase</h3>
  <div class="status">
    <div class="dot wait" id="dot-conn"></div>
    <span id="txt-conn">Conectando...</span>
  </div>
</div>

<div class="card">
  <h3>2. Enviar Pedido Teste</h3>
  <button class="btn" onclick="enviarTeste()">🧪 Enviar Pedido Teste</button>
  <div class="log" id="log-envio">Aguardando...</div>
</div>

<div class="card">
  <h3>3. Pedidos no Firebase (ao vivo)</h3>
  <div class="pedidos-lista" id="lista-pedidos">
    <div style="color:#666;font-size:13px">Aguardando pedidos...</div>
  </div>
  <button class="btn red" onclick="limparTodos()" style="margin-top:10px">🗑️ Limpar todos os pedidos</button>
</div>

<div class="card">
  <h3>4. Links do Sistema</h3>
  <a href="https://pointbreakbrs.github.io/pointbreak/" target="_blank">
    <button class="btn">📋 Abrir Cardápio Interno</button>
  </a>
  <a href="https://pointbreakbrs.github.io/pointbreak/pointbreak-cozinha.html" target="_blank">
    <button class="btn" style="margin-top:8px;background:#1e2127;color:#e8a020;border:2px solid #e8a020">👨‍🍳 Abrir Cozinha</button>
  </a>
  <a href="https://pointbreakbrs.github.io/pointbreak/pointbreak-cliente.html" target="_blank">
    <button class="btn" style="margin-top:8px;background:#1e2127;color:#22c55e;border:2px solid #22c55e">📱 Abrir Cardápio Cliente</button>
  </a>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB0Vb_lXfyMy44E29dRjZlihygq9",
  authDomain: "pointbreak-426d2.firebaseapp.com",
  databaseURL: "https://pointbreak-426d2-default-rtdb.firebaseio.com",
  projectId: "pointbreak-426d2",
  storageBucket: "pointbreak-426d2.firebasestorage.app",
  messagingSenderId: "1057881922750",
  appId: "1:1057881922750:web:c37b5fb65c3065"
};

firebase.initializeApp(firebaseConfig);
const DB = firebase.database();

// Testar conexão
const connRef = DB.ref('.info/connected');
connRef.on('value', snap => {
  const connected = snap.val();
  const dot = document.getElementById('dot-conn');
  const txt = document.getElementById('txt-conn');
  if(connected) {
    dot.className = 'dot ok';
    txt.textContent = '✅ Conectado ao Firebase com sucesso!';
    txt.style.color = '#22c55e';
  } else {
    dot.className = 'dot erro';
    txt.textContent = '❌ Sem conexão com Firebase';
    txt.style.color = '#ef4444';
  }
});

// Ouvir pedidos em tempo real
DB.ref('pedidos').on('value', snap => {
  const data = snap.val() || {};
  const lista = Object.entries(data);
  const el = document.getElementById('lista-pedidos');
  if(!lista.length) {
    el.innerHTML = '<div style="color:#666;font-size:13px">Nenhum pedido ainda</div>';
    return;
  }
  el.innerHTML = lista.reverse().map(([key, p]) => `
    <div class="pedido-item">
      <span class="pnum">#${p.comanda||'???'}</span>
      <span class="pstatus ${p.status||'aguardando'}">${p.status||'aguardando'}</span>
      <span style="margin-left:8px;color:#888;font-size:12px">${p.nome||''}</span>
      <div style="font-size:11px;color:#555;margin-top:3px">${p.hora||''} · ${p.origem||'interno'} · R$ ${(p.total||0).toFixed(2).replace('.',',')}</div>
    </div>`).join('');
});

// Enviar pedido teste
function enviarTeste() {
  const log = document.getElementById('log-envio');
  log.textContent = 'Enviando pedido teste...';
  const pedido = {
    uid: 'teste-' + Date.now(),
    comanda: 'TST',
    nome: '🧪 Pedido Teste',
    pagto: 'PIX',
    entrega: 'retirada',
    frete: 0,
    total: 17,
    hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}),
    timestamp: Date.now(),
    status: 'aguardando',
    origem: 'diagnostico',
    itens: [{nome:'Dog Simples', qty:1, subtotal:17, removed:[], extras:[], obs:'', sabor:'', acaiAcomp:[]}]
  };
  DB.ref('pedidos').push(pedido)
    .then(() => { log.textContent = '✅ Pedido enviado com sucesso!\nVerifique se apareceu na lista acima\ne no painel da cozinha.'; log.style.color='#4ade80'; })
    .catch(e => { log.textContent = '❌ Erro: ' + e.message; log.style.color='#f87171'; });
}

function limparTodos() {
  if(!confirm('Limpar TODOS os pedidos do Firebase?')) return;
  DB.ref('pedidos').remove()
    .then(() => alert('✅ Todos os pedidos foram removidos!'))
    .catch(e => alert('❌ Erro: ' + e.message));
}
</script>
</body>
</html>
