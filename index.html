<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Point Break — Comandas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111214;--surface:#1a1c20;--card:#22252b;--border:#2e3138;
  --gold:#e8a020;--gold2:#f5b83d;--red:#c0392b;--green:#27ae60;--blue:#3b82f6;
  --purple:#8b5cf6;
  --text:#f0f0f0;--muted:#888;--radius:12px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:linear-gradient(135deg,#1a1c20,#0d0f11);border-bottom:3px solid var(--gold);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.6)}
.hlogo{width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(232,160,32,0.4))}
header h1{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:2px;text-transform:uppercase;line-height:1}
header p{font-size:11px;color:var(--muted);margin-top:1px}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px}
.comanda-display{text-align:right}
.comanda-display span{font-size:10px;color:var(--muted);display:block}
.comanda-display strong{font-size:20px;font-weight:900;color:var(--gold)}
.btn-editor{background:transparent;border:1.5px solid var(--gold);border-radius:7px;color:var(--gold);font-size:11px;font-weight:700;padding:6px 10px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn-editor:hover{background:var(--gold);color:#111}

/* NAV */
.cat-nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:68px;z-index:100}
.cat-nav-inner{max-width:980px;margin:0 auto;display:flex;gap:4px;padding:8px 14px;overflow-x:auto;scrollbar-width:none}
.cat-nav-inner::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;background:transparent;border:1.5px solid var(--border);border-radius:20px;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:700;padding:6px 13px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.cat-btn:hover{border-color:var(--gold);color:var(--gold)}
.cat-btn.active{background:var(--gold);border-color:var(--gold);color:#111}

/* MAIN */
.main{max-width:980px;margin:0 auto;padding:0 12px 180px}
.section{padding-top:24px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.section-head h2{font-size:18px;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:0.5px}
.section-head::after{content:'';flex:1;height:1px;background:var(--border)}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}

/* ITEM CARD */
.item-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;transition:border-color 0.18s;cursor:pointer}
.item-card:hover{border-color:#3a3d45}
.item-card.has-items{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)22}
.item-badge{position:absolute;top:8px;left:8px;background:var(--gold);color:#111;font-size:11px;font-weight:900;width:22px;height:22px;border-radius:50%;display:none;align-items:center;justify-content:center;z-index:5;box-shadow:0 2px 8px rgba(232,160,32,0.5)}
.item-badge.show{display:flex}

/* CARD COM IMAGEM */


.card-body{padding:12px;cursor:pointer}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-size:14px;font-weight:800;color:var(--text);line-height:1.2;flex:1}
.card-price{font-size:17px;font-weight:900;color:var(--gold2);white-space:nowrap;flex-shrink:0}
.card-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}

/* ENTRIES */
.item-entries{padding:0 12px 8px}
.entry-row{background:#12141a;border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-bottom:5px}
.entry-header{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.entry-num{background:var(--gold);color:#111;font-size:10px;font-weight:900;border-radius:4px;padding:1px 6px;flex-shrink:0}
.entry-mods{font-size:11px;color:var(--muted);line-height:1.4;flex:1}
.entry-price{font-size:12px;font-weight:900;color:var(--gold2);white-space:nowrap}
.entry-actions{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.qty-row{display:flex;align-items:center;gap:5px}
.qty-btn{width:26px;height:26px;background:var(--border);border:none;border-radius:6px;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.qty-btn:hover{background:var(--gold);color:#111}
.qty-val{font-size:14px;font-weight:900;color:var(--gold2);min-width:18px;text-align:center}
.btn-edit{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;font-weight:700;padding:4px 8px;cursor:pointer;transition:all 0.15s}
.btn-edit:hover{border-color:var(--gold);color:var(--gold)}
.btn-del{background:transparent;border:1px solid #44262a;border-radius:6px;color:var(--red);font-size:11px;padding:4px 8px;cursor:pointer}
.btn-del:hover{background:#1f0808}
.btn-addmore{margin:0 12px 10px;width:calc(100% - 24px);background:transparent;border:1.5px dashed var(--border);border-radius:9px;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:700;padding:8px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-addmore:hover{border-color:var(--gold);color:var(--gold)}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column;border-top:2px solid var(--gold);animation:su 0.25s ease}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.sheet-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sheet-head h3{font-size:15px;font-weight:900;color:var(--gold);letter-spacing:1px;flex:1}
.btn-close{background:var(--card);border:none;border-radius:7px;color:var(--muted);font-size:18px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-close:hover{color:var(--text)}
.sheet-body{overflow-y:auto;padding:14px 16px;flex:1}
.sheet-footer{padding:12px 16px 22px;border-top:1px solid var(--border)}

/* PERSONALIZAR */
.pers-sec{margin-bottom:12px}
.pers-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--text);cursor:pointer;transition:all 0.15s;user-select:none}
.tag.remove:hover{border-color:var(--red);color:var(--red)}
.tag.remove.on{background:#1f0808;border-color:var(--red);color:var(--red);text-decoration:line-through}
.tag.add:hover{border-color:var(--green);color:var(--green)}
.tag.add.on{background:#071a0e;border-color:var(--green);color:var(--green)}
.tag.add .tag-price{font-size:10px;opacity:0.75}
.sabor-opts{display:flex;gap:6px;flex-wrap:wrap}
.sabor-btn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-weight:700;padding:7px 13px;cursor:pointer;transition:all 0.15s}
.sabor-btn.on{background:#1e1a0a;border-color:var(--gold);color:var(--gold)}
.pers-obs{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;padding:8px 11px;resize:none;outline:none;transition:border-color 0.15s}
.pers-obs:focus{border-color:var(--gold)}
.qty-modal{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 0}
.qty-modal-btn{width:40px;height:40px;background:var(--border);border:none;border-radius:10px;color:var(--text);font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.qty-modal-btn:hover{background:var(--gold);color:#111}
.qty-modal-val{font-size:28px;font-weight:900;color:var(--gold2);min-width:34px;text-align:center}
.btn-confirm{width:100%;background:var(--gold);color:#111;border:none;border-radius:11px;font-family:var(--font);font-size:15px;font-weight:900;padding:14px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.btn-confirm:hover{background:var(--gold2)}

/* AÇAÍ ESPECIAL */
.acai-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.acai-size{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px 13px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:10px}
.acai-size:hover{border-color:var(--purple)}
.acai-size.on{border-color:var(--purple);background:#140d1f}
.acai-size-label{font-weight:900;color:var(--text);font-size:14px;flex:1}
.acai-size-info{font-size:11px;color:var(--muted)}
.acai-size-price{font-size:17px;font-weight:900;color:var(--purple)}
.acai-acomp{margin-top:10px}
.acomp-counter{font-size:12px;font-weight:700;padding:5px 10px;border-radius:7px;margin-bottom:8px}
.acomp-counter.ok{background:#071a0e;color:var(--green)}
.acomp-counter.warn{background:#1f1008;color:var(--gold)}
.acomp-counter.over{background:#1f0808;color:var(--red)}
.tag.gratis.on{background:#071a0e;border-color:var(--green);color:var(--green)}
.tag.gratis:hover{border-color:var(--green);color:var(--green)}
.tag.pago.on{background:#0a1a2e;border-color:var(--blue);color:var(--blue)}
.tag.pago:hover{border-color:var(--blue);color:var(--blue)}

/* CART BTN */
.cart-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;padding:10px 14px 18px;background:linear-gradient(to top,var(--bg) 70%,transparent);pointer-events:none}
.cart-btn{max-width:980px;margin:0 auto;background:var(--gold);border:none;border-radius:13px;color:#111;font-family:var(--font);font-size:15px;font-weight:900;padding:14px 18px;cursor:pointer;width:100%;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(232,160,32,0.45);pointer-events:all;transition:all 0.2s;display:none}
.cart-btn.show{display:flex}
.cart-btn:hover{background:var(--gold2);transform:translateY(-1px)}
.cart-count{background:#111;color:var(--gold);border-radius:7px;font-size:12px;font-weight:900;padding:3px 8px}
.cart-label{flex:1;text-align:left}
.cart-total{font-size:16px}

/* SHEET CARRINHO */
.resumo-item{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.resumo-item:last-child{border-bottom:none}
.ri-qty{background:var(--gold);color:#111;font-weight:900;font-size:11px;border-radius:5px;padding:2px 6px;flex-shrink:0;margin-top:2px}
.ri-info{flex:1}
.ri-name{font-size:13px;font-weight:700}
.ri-mods{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.ri-price{font-size:14px;font-weight:900;color:var(--gold2);white-space:nowrap}
.ri-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 4px}
.ri-del:hover{color:var(--red)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px}
.total-row.big{font-size:19px;font-weight:900;color:var(--gold);margin-top:10px;padding-top:10px;border-top:2px solid var(--gold)}

/* FORM */
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;display:block;margin-top:11px}
.req{color:var(--red)}
.form-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;padding:9px 11px;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--gold)}
.form-input.err{border-color:var(--red)!important}
select.form-input option{background:var(--card)}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.entrega-opts{display:flex;gap:8px;margin-top:5px}
.entrega-btn{flex:1;background:var(--card);border:2px solid var(--border);border-radius:9px;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:700;padding:10px 8px;cursor:pointer;transition:all 0.15s;text-align:center}
.entrega-btn.on{border-color:var(--gold);background:#1e1a0a;color:var(--gold)}
.frete-opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.frete-opt{background:var(--card);border:1.5px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;font-weight:700;padding:7px 11px;cursor:pointer;transition:all 0.15s}
.frete-opt.on{border-color:var(--gold);background:#1e1a0a;color:var(--gold)}
.err-msg{background:#1f0808;border:1px solid var(--red);border-radius:8px;padding:9px 13px;font-size:13px;color:#f87171;margin-top:8px;display:none}
.err-msg.show{display:block}
.btn-fin{width:100%;background:var(--gold);color:#111;border:none;border-radius:11px;font-family:var(--font);font-size:16px;font-weight:900;padding:14px;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;margin-top:12px}
.btn-fin:hover{background:var(--gold2)}

/* SUCESSO */
.success-screen{display:none;text-align:center;padding:26px 14px}
.success-screen.show{display:block}
.suc-icon{font-size:54px;margin-bottom:10px}
.success-screen h3{font-size:22px;font-weight:900;color:var(--green);margin-bottom:4px}
.suc-num{font-size:44px;font-weight:900;color:var(--gold);line-height:1;margin:6px 0}
.btn-nova{background:var(--card);border:2px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-size:14px;font-weight:700;padding:12px;cursor:pointer;margin-top:10px;width:100%;transition:all 0.15s}
.btn-nova:hover{border-color:var(--gold);color:var(--gold)}
.btn-print{background:var(--gold);color:#111;border:none;border-radius:9px;font-family:var(--font);font-size:14px;font-weight:900;padding:12px;cursor:pointer;margin-top:8px;width:100%}
.btn-print:hover{background:var(--gold2)}

/* PRINT */

  #print-area,#print-area *{visibility:visible!important}
  #print-area{position:fixed;inset:0;background:white!important;color:black!important;padding:12px;font-family:'Courier New',monospace;font-size:12px}
  @page{margin:2mm;size:58mm auto}
}
#print-area{display:none;position:fixed;inset:0;z-index:99999;background:white;overflow:auto;padding:16px}





@media(max-width:600px){.form-row2{grid-template-columns:1fr}.items-grid{grid-template-columns:1fr}}

@media print {
  html, body { 
    margin: 0 !important; 
    padding: 0 !important;
    background: white !important;
    height: auto !important;
    overflow: visible !important;
  }
  body > *:not(#print-area) { display: none !important; }
  #print-area { 
    display: block !important;
    position: static !important;
    width: 100% !important;
    background: white !important;
    color: black !important;
    margin: 0 !important;
    padding: 0 !important;
  }
  @page{margin:2mm;size:58mm auto}
}

</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB0Vb_lXfyMy44E29dRjZlihygq9",
  authDomain: "pointbreak-426d2.firebaseapp.com",
  databaseURL: "https://pointbreak-426d2-default-rtdb.firebaseio.com",
  projectId: "pointbreak-426d2",
  storageBucket: "pointbreak-426d2.firebasestorage.app",
  messagingSenderId: "1057881922750",
  appId: "1:1057881922750:web:c37b5fb65c3065"
};
firebase.initializeApp(firebaseConfig);
const DB = firebase.database();

// ===== FUNÇÕES FIREBASE =====
function fbEnviarPedido(pedido) {
  DB.ref('pedidos').push(pedido).catch(e => console.warn('Firebase erro:', e));
}
function fbOuvirPedidos(callback) {
  DB.ref('pedidos').on('value', snap => {
    const data = snap.val() || {};
    const lista = Object.entries(data).map(([key, val]) => ({...val, _fbKey: key}));
    callback(lista);
  });
}
function fbAtualizarStatus(fbKey, status) {
  DB.ref('pedidos/' + fbKey).update({ status }).catch(e => console.warn('Firebase erro:', e));
}
function fbRemoverPedido(fbKey) {
  DB.ref('pedidos/' + fbKey).remove().catch(e => console.warn('Firebase erro:', e));
}
function fbLimparProntos(pedidos) {
  pedidos.filter(p => p.status === 'pronto').forEach(p => {
    if(p._fbKey) DB.ref('pedidos/' + p._fbKey).remove();
  });
}
</script>

// Auto-init comanda number on load
window.addEventListener('DOMContentLoaded', function(){
  // Render all menu items
  renderAllMenuItems();

  // Pre-fill comanda with next number (peek, don't increment yet)
  try{
    const saved = parseInt(localStorage.getItem('pb_ultima_comanda')||'0');
    const next = saved + 1;
    const input = document.getElementById('f-comanda');
    if(input){ input.value = next; syncComanda(String(next).padStart(3,'0')); }
  }catch(e){}
});
let cart=[], entrega='', freteVal=0, freteSet=false, comandaNum=1;

function getImgUrl(q) {
  return `https://source.unsplash.com/300x200/?${encodeURIComponent(q)},food`;
}

// ==================== RENDER MENU ====================
const GRIDS={dog:'grid-dog',burger:'grid-burger',xis:'grid-xis',pastel:'grid-pastel',fritas:'grid-fritas',acai:'grid-acai',bebidas:'grid-bebidas'};
function renderAllMenuItems(){
  Object.entries(GRIDS).forEach(([cat,gid])=>{
  const g=document.getElementById(gid);
  MENU[cat].forEach(item=>{
    const div=document.createElement('div');
    div.className='item-card';div.id='ic-'+item.id;
    const descTxt=item.ingr.length?item.ingr.join(', '):'';
    div.innerHTML=`
      <div class="item-badge" id="badge-${item.id}">0</div>
      <div class="card-body" onclick="abrirPers('${item.id}')" style="cursor:pointer">
        <div class="card-top">
          <div class="card-name">${item.nome}</div>
          <div class="card-price">R$&nbsp;${item.preco.toFixed(2).replace('.',',')}</div>
        </div>
        ${descTxt?`<div class="card-desc">${descTxt}</div>`:''}
        ${item.isAcai?`<div class="card-desc" style="color:var(--purple);margin-top:4px">🫐 ${item.acompGratis} acompanhamentos grátis</div>`:''}
      </div>
      <div class="item-entries" id="entries-${item.id}"></div>
      <button class="btn-addmore" id="addmore-${item.id}" style="display:none" onclick="abrirPers('${item.id}')">＋ Adicionar com opções diferentes</button>`;
    g.appendChild(div);
  });
});

}


function findItem(id){for(const cat of Object.values(MENU)){const f=cat.find(x=>x.id===id);if(f)return f;}return null;}

// ==================== PERSONALIZAR ====================
function abrirPers(itemId,editUid=null){
  const item=findItem(itemId);if(!item)return;
  if(editUid){const e=cart.find(x=>x.uid===editUid);if(e)persState={itemId,uid:editUid,removed:[...e.removed],extras:[...e.extras.map(x=>({...x}))],obs:e.obs,sabor:e.sabor,qty:e.qty,acaiAcomp:[...(e.acaiAcomp||[])],acaiPagos:[...(e.acaiPagos||[])]};}
  else persState={itemId,uid:null,removed:[],extras:[],obs:'',sabor:'',qty:1,acaiAcomp:[],acaiPagos:[]};

  document.getElementById('pers-title').textContent=(editUid?'✏️ Editar: ':'➕ Adicionar: ')+item.nome;
  updPersPrice(item);

  let html=`<div class="pers-sec"><div class="pers-lbl">📦 Quantidade</div>
    <div class="qty-modal">
      <button class="qty-modal-btn" onclick="chgPQty(-1,'${itemId}')">−</button>
      <span class="qty-modal-val" id="pers-qty">${persState.qty}</span>
      <button class="qty-modal-btn" onclick="chgPQty(1,'${itemId}')">+</button>
    </div></div>`;

  // AÇAÍ especial
  if(item.isAcai){
    const total=persState.acaiAcomp.length;
    const max=item.acompGratis;
    const statusClass=total===0?'warn':total<=max?'ok':'over';
    const statusTxt=total===0?`Selecione ${max} acompanhamentos grátis`:total<max?`Selecione mais ${max-total} grátis`:total===max?`✅ ${max} grátis selecionados`:`⚠️ ${total-max} pago(s) extra`;
    html+=`<div class="pers-sec">
      <div class="pers-lbl">🫐 Acompanhamentos Grátis (escolha ${max})</div>
      <div class="acomp-counter ${statusClass}" id="acomp-counter">${statusTxt}</div>
      <div class="tags" id="acomp-gratis-tags">
        ${ACOMP_GRATIS.map(a=>`<span class="tag gratis${persState.acaiAcomp.includes(a)?' on':''}" onclick="togAcomp('${a}',${max},this,'${itemId}')">${a}</span>`).join('')}
      </div>
    </div>
    <div class="pers-sec">
      <div class="pers-lbl">➕ Acompanhamentos Pagos</div>
      <div class="tags">
        ${ACOMP_PAGOS.map(a=>`<span class="tag pago${persState.acaiPagos.includes(a.n)?' on':''}" onclick="togAcompPago('${a.n}',${a.p},this,'${itemId}')">${a.n} <span class="tag-price">+R$${a.p}</span></span>`).join('')}
      </div>
    </div>`;
  } else {
    // Retirar ingredientes (sem pão/molho)
    if(item.ingr.length){
      html+=`<div class="pers-sec"><div class="pers-lbl">🚫 Retirar ingredientes</div>
        <div class="tags">
          ${item.ingr.map(i=>`<span class="tag remove${persState.removed.includes(i)?' on':''}" onclick="togPRem('${i}',this)">${i}</span>`).join('')}
        </div></div>`;
    }
    // Sabores pastel chocolate
    if(item.sabores){
      html+=`<div class="pers-sec"><div class="pers-lbl">🍫 Sabor do Chocolate</div>
        <div class="sabor-opts">
          ${item.sabores.map(s=>`<button class="sabor-btn${persState.sabor===s?' on':''}" onclick="togPSabor('${s}',this)">${s}</button>`).join('')}
        </div></div>`;
    }
    // Adicionais específicos do item
    if(item.adicionais&&item.adicionais.length){
      html+=`<div class="pers-sec"><div class="pers-lbl">➕ Adicionais</div>
        <div class="tags">
          ${item.adicionais.map(a=>`<span class="tag add${persState.extras.find(x=>x.nome===a.n)?' on':''}" onclick="togPExtra('${a.n}',${a.p},this,'${itemId}')">${a.n} <span class="tag-price">+R$${a.p}</span></span>`).join('')}
        </div></div>`;
    }
  }

  html+=`<div class="pers-sec"><div class="pers-lbl">📝 Observação</div>
    <textarea class="pers-obs" rows="2" placeholder="Ex: sem cebola, bem passado..." oninput="persState.obs=this.value">${persState.obs}</textarea></div>`;

  document.getElementById('pers-body').innerHTML=html;
  document.getElementById('ov-pers').classList.add('show');
}

function fecharPers(){document.getElementById('ov-pers').classList.remove('show');}
function chgPQty(d,itemId){persState.qty=Math.max(1,persState.qty+d);document.getElementById('pers-qty').textContent=persState.qty;updPersPrice(findItem(itemId));}
function togPRem(ing,el){const i=persState.removed.indexOf(ing);if(i===-1){persState.removed.push(ing);el.classList.add('on');}else{persState.removed.splice(i,1);el.classList.remove('on');}}
function togPExtra(nome,preco,el,itemId){const i=persState.extras.findIndex(x=>x.nome===nome);if(i===-1){persState.extras.push({nome,preco});el.classList.add('on');}else{persState.extras.splice(i,1);el.classList.remove('on');}updPersPrice(findItem(itemId));}
function togPSabor(s,btn){persState.sabor=s;btn.closest('.sabor-opts').querySelectorAll('.sabor-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}

function togAcomp(nome,max,el,itemId){
  const i=persState.acaiAcomp.indexOf(nome);
  if(i===-1){persState.acaiAcomp.push(nome);el.classList.add('on');}
  else{persState.acaiAcomp.splice(i,1);el.classList.remove('on');}
  updAcompCounter(max,itemId);updPersPrice(findItem(itemId));
}
function togAcompPago(nome,preco,el,itemId){
  const i=persState.acaiPagos.indexOf(nome);
  if(i===-1){persState.acaiPagos.push(nome);el.classList.add('on');persState.extras.push({nome,preco});}
  else{persState.acaiPagos.splice(i,1);el.classList.remove('on');persState.extras=persState.extras.filter(x=>x.nome!==nome);}
  updPersPrice(findItem(itemId));
}
function updAcompCounter(max,itemId){
  const total=persState.acaiAcomp.length;
  const c=document.getElementById('acomp-counter');if(!c)return;
  let cls='warn',txt='';
  if(total===0){cls='warn';txt=`Selecione ${max} acompanhamentos grátis`;}
  else if(total<max){cls='warn';txt=`Selecione mais ${max-total} grátis`;}
  else if(total===max){cls='ok';txt=`✅ ${max} grátis selecionados`;}
  else{cls='over';txt=`⚠️ ${total-max} pago(s) extra`;}
  c.className=`acomp-counter ${cls}`;c.textContent=txt;
}

function updPersPrice(item){
  if(!item)return;
  const et=persState.extras.reduce((s,x)=>s+x.preco,0);
  document.getElementById('pers-price').textContent='R$ '+((item.preco+et)*persState.qty).toFixed(2).replace('.',',');
}

function confirmarItem(){
  const item=findItem(persState.itemId);if(!item)return;
  if(persState.uid){const e=cart.find(x=>x.uid===persState.uid);if(e)Object.assign(e,{removed:[...persState.removed],extras:[...persState.extras],obs:persState.obs,sabor:persState.sabor,qty:persState.qty,acaiAcomp:[...persState.acaiAcomp],acaiPagos:[...persState.acaiPagos]});}
  else{const uid='u'+Date.now()+Math.random().toString(36).slice(2,5);cart.push({uid,itemId:persState.itemId,item,qty:persState.qty,removed:[...persState.removed],extras:[...persState.extras],obs:persState.obs,sabor:persState.sabor,acaiAcomp:[...persState.acaiAcomp],acaiPagos:[...persState.acaiPagos]});}
  fecharPers();renderEntries(persState.itemId);updCartBtn();
}

function renderEntries(itemId){
  const entries=cart.filter(e=>e.itemId===itemId);
  const card=document.getElementById('ic-'+itemId);
  const el=document.getElementById('entries-'+itemId);
  const btn=document.getElementById('addmore-'+itemId);
  const badge=document.getElementById('badge-'+itemId);
  if(!entries.length){el.innerHTML='';btn.style.display='none';card.classList.remove('has-items');badge.classList.remove('show');return;}
  card.classList.add('has-items');
  const tq=entries.reduce((s,e)=>s+e.qty,0);
  badge.textContent=tq;badge.classList.add('show');
  btn.style.display='flex';
  el.innerHTML=entries.map((e,i)=>{
    const et=e.extras.reduce((s,x)=>s+x.preco,0);
    const sub=(e.item.preco+et)*e.qty;
    let mods=[];
    if(e.removed&&e.removed.length)mods.push(`<span style="color:#f87171">− ${e.removed.join(', ')}</span>`);
    if(e.extras&&e.extras.length)mods.push(`<span style="color:#4ade80">+ ${e.extras.map(x=>x.nome).join(', ')}</span>`);
    if(e.acaiAcomp&&e.acaiAcomp.length)mods.push(`🫐 ${e.acaiAcomp.join(', ')}`);
    if(e.sabor)mods.push(`Sabor: ${e.sabor}`);
    if(e.obs)mods.push(`<i>${e.obs}</i>`);
    return `<div class="entry-row"><div class="entry-header">
      <span class="entry-num">${i+1}º</span>
      <span class="entry-mods">${mods.length?mods.join(' · '):'Padrão'}</span>
      <span class="entry-price">R$ ${sub.toFixed(2).replace('.',',')}</span>
    </div><div class="entry-actions">
      <div class="qty-row">
        <button class="qty-btn" onclick="chgEQty('${e.uid}',-1)">−</button>
        <span class="qty-val" id="eqv-${e.uid}">${e.qty}</span>
        <button class="qty-btn" onclick="chgEQty('${e.uid}',1)">+</button>
      </div>
      <button class="btn-edit" onclick="abrirPers('${itemId}','${e.uid}')">✏️</button>
      <button class="btn-del" onclick="delEntry('${e.uid}','${itemId}')">✕</button>
    </div></div>`;
  }).join('');
}

function chgEQty(uid,d){const e=cart.find(x=>x.uid===uid);if(!e)return;e.qty=Math.max(1,e.qty+d);document.getElementById('eqv-'+uid).textContent=e.qty;renderEntries(e.itemId);updCartBtn();}
function delEntry(uid,itemId){cart=cart.filter(x=>x.uid!==uid);renderEntries(itemId);updCartBtn();}

// ==================== CART ====================
function calcSub(){return cart.reduce((s,e)=>{const et=e.extras.reduce((x,a)=>x+a.preco,0);return s+(e.item.preco+et)*e.qty;},0);}
function updCartBtn(){
  const btn=document.getElementById('cart-btn');
  if(!cart.length){btn.classList.remove('show');return;}
  btn.classList.add('show');
  const total=calcSub()+(entrega==='delivery'&&freteSet?freteVal:0);
  const qty=cart.reduce((s,e)=>s+e.qty,0);
  document.getElementById('cart-count').textContent=qty;
  document.getElementById('cart-total').textContent='R$ '+total.toFixed(2).replace('.',',');
}

function abrirCarrinho(){
  renderResumo();
  document.getElementById('cart-title').textContent='🛒 Carrinho';
  document.getElementById('cart-view').style.display='block';
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('ov-cart').classList.add('show');
}
function fecharCarrinho(){document.getElementById('ov-cart').classList.remove('show');}
function fecharSeOv(e,id){if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('show');}

function renderResumo(){
  let html='',sub=calcSub();
  cart.forEach(e=>{
    const et=e.extras.reduce((s,x)=>s+x.preco,0);
    const s=(e.item.preco+et)*e.qty;
    let mods=[];
    if(e.removed&&e.removed.length)mods.push(`<span style="color:#f87171">− ${e.removed.join(', ')}</span>`);
    if(e.extras&&e.extras.length)mods.push(`<span style="color:#4ade80">+ ${e.extras.map(x=>x.nome).join(', ')}</span>`);
    if(e.acaiAcomp&&e.acaiAcomp.length)mods.push(`🫐 ${e.acaiAcomp.join(', ')}`);
    if(e.sabor)mods.push(`Sabor: ${e.sabor}`);
    if(e.obs)mods.push(`<i>${e.obs}</i>`);
    html+=`<div class="resumo-item">
      <span class="ri-qty">${e.qty}x</span>
      <div class="ri-info"><div class="ri-name">${e.item.nome}</div>
      ${mods.length?`<div class="ri-mods">${mods.join(' · ')}</div>`:''}</div>
      <span class="ri-price">R$ ${s.toFixed(2).replace('.',',')}</span>
      <button class="ri-del" onclick="remItem('${e.uid}')">✕</button>
    </div>`;
  });
  document.getElementById('resumo-itens').innerHTML=html||'<p style="text-align:center;color:var(--muted);padding:20px">Carrinho vazio</p>';
  const frete=entrega==='delivery'&&freteSet?freteVal:0;
  document.getElementById('val-sub').textContent='R$ '+sub.toFixed(2).replace('.',',');
  document.getElementById('val-frete').textContent='R$ '+frete.toFixed(2).replace('.',',');
  document.getElementById('val-total').textContent='R$ '+(sub+frete).toFixed(2).replace('.',',');
  document.getElementById('frete-rows').style.display=entrega==='delivery'?'block':'none';
}
function remItem(uid){const e=cart.find(x=>x.uid===uid);if(!e)return;const id=e.itemId;cart=cart.filter(x=>x.uid!==uid);renderEntries(id);updCartBtn();renderResumo();}

// ==================== ENTREGA / FRETE ====================
function setEntrega(v){
  entrega=v;
  document.getElementById('btn-ret').classList.toggle('on',v==='retirada');
  document.getElementById('btn-del').classList.toggle('on',v==='delivery');
  document.getElementById('delivery-fields').style.display=v==='delivery'?'block':'none';
  if(v==='retirada'){freteVal=0;freteSet=true;}else freteSet=false;
  renderResumo();
}
function setFrete(btn,val){
  document.querySelectorAll('.frete-opt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('frete-custom').style.display=val===-1?'block':'none';
  if(val!==-1){freteVal=val;freteSet=true;}else freteSet=false;
  renderResumo();
}
function updFreteCustom(){const v=parseFloat(document.getElementById('f-frete').value);freteVal=isNaN(v)?0:v;freteSet=!isNaN(v)&&v>=0;renderResumo();}
function syncComanda(val){const n=parseInt(val)||1;comandaNum=n;document.getElementById('num-display').textContent=String(n).padStart(3,'0');}

// ==================== FINALIZAR ====================
function finalizar(){
  const nome=document.getElementById('f-nome').value.trim();
  const cmd=document.getElementById('f-comanda').value.trim();
  const pagto=document.getElementById('f-pagto').value;
  const err=document.getElementById('err-msg');
  let erros=[];
  if(!cmd){document.getElementById('f-comanda').classList.add('err');erros.push(1);}else document.getElementById('f-comanda').classList.remove('err');
  if(!nome){document.getElementById('f-nome').classList.add('err');erros.push(1);}else document.getElementById('f-nome').classList.remove('err');
  if(!pagto){document.getElementById('f-pagto').classList.add('err');erros.push(1);}else document.getElementById('f-pagto').classList.remove('err');
  if(!entrega)erros.push(1);
  if(entrega==='delivery'){
    const end=document.getElementById('f-end').value.trim();
    const bairro=document.getElementById('f-bairro').value.trim();
    if(!end){document.getElementById('f-end').classList.add('err');erros.push(1);}else document.getElementById('f-end').classList.remove('err');
    if(!bairro){document.getElementById('f-bairro').classList.add('err');erros.push(1);}else document.getElementById('f-bairro').classList.remove('err');
    if(!freteSet)erros.push(1);
  }
  if(!cart.length)erros.push(1);
  if(erros.length){err.textContent=!cart.length?'⚠️ Adicione pelo menos um item.':'⚠️ Preencha todos os campos obrigatórios.';err.classList.add('show');return;}
  err.classList.remove('show');
  // Confirmar e incrementar número da comanda
  consumirComanda();
  gerarImpressao();
  document.getElementById('suc-num').textContent='#'+cmd.padStart(3,'0');
  document.getElementById('suc-nome').textContent=nome;
  document.getElementById('cart-view').style.display='none';
  document.getElementById('success-screen').classList.add('show');
  document.getElementById('cart-title').textContent='✅ Pedido Confirmado!';
  // Envia para Firebase (cozinha)
  try{
    fbEnviarPedido({
      uid:'u'+Date.now(),
      comanda:cmd.padStart(3,'0'),
      nome, pagto, entrega,
      frete: entrega==='delivery'?freteVal:0,
      total: calcSub()+(entrega==='delivery'&&freteSet?freteVal:0),
      hora: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
      timestamp: Date.now(),
      status: 'aguardando',
      itens: cart.map(e=>{
        const et=e.extras.reduce((s,x)=>s+x.preco,0);
        return {
          nome:e.item.nome, qty:e.qty,
          subtotal:(e.item.preco+et)*e.qty,
          removed:e.removed||[], extras:e.extras||[],
          obs:e.obs, sabor:e.sabor, acaiAcomp:e.acaiAcomp||[]
        };
      })
    });
  }catch(e){ console.warn('Firebase erro:',e); }
}

function gerarImpressao(){
  const nome=document.getElementById('f-nome').value.trim();
  const cmd=document.getElementById('f-comanda').value.trim().padStart(3,'0');
  const pagto=document.getElementById('f-pagto').value;
  const obs=document.getElementById('f-obs').value.trim();
  const end=entrega==='delivery'?document.getElementById('f-end').value.trim():'';
  const bairro=entrega==='delivery'?document.getElementById('f-bairro').value.trim():'';
  const tel=document.getElementById('f-tel').value.trim();
  const agora=new Date();
  const data=agora.toLocaleDateString('pt-BR');
  const hora=agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  let linhas='',total=0;
  cart.forEach(({item,qty,removed,extras,obs:iobs,sabor,acaiAcomp})=>{
    const et=extras.reduce((s,x)=>s+x.preco,0);
    const sub=(item.preco+et)*qty;total+=sub;
    linhas+=`<div class="pr-r"><span>${qty}x ${item.nome}</span><span>R$ ${sub.toFixed(2).replace('.',',')}</span></div>`;
    if(removed&&removed.length)linhas+=`<div style="font-size:11px;padding-left:10px">− Retirar: ${removed.join(', ')}</div>`;
    if(extras&&extras.length)linhas+=`<div style="font-size:11px;padding-left:10px">+ Adicional: ${extras.map(x=>x.nome).join(', ')}</div>`;
    if(acaiAcomp&&acaiAcomp.length)linhas+=`<div style="font-size:11px;padding-left:10px">🫐 Acomp: ${acaiAcomp.join(', ')}</div>`;
    if(sabor)linhas+=`<div style="font-size:11px;padding-left:10px">Sabor: ${sabor}</div>`;
    if(iobs)linhas+=`<div style="font-size:11px;padding-left:10px">Obs: ${iobs}</div>`;
  });
  const frete=entrega==='delivery'&&freteSet?freteVal:0;
  if(frete>0){total+=frete;linhas+=`<div class="pr-r"><span>Frete</span><span>R$ ${frete.toFixed(2).replace('.',',')}</span></div>`;}
  document.getElementById('print-area').innerHTML = gerarReceiptHTML();
}

      <div style="border-top:2px solid #000;margin:8px 0"></div>
      <div style="font-size:20px;font-weight:900;letter-spacing:2px">COMANDA #${cmd}</div>
      <div style="font-size:11px;color:#444">${data} &nbsp;|&nbsp; ${hora}</div>
    </div>

      ${tel?`<tr><td style="padding:3px 4px;color:#444">Telefone</td><td style="padding:3px 4px;text-align:right">${tel}</td></tr>`:''}

      ${entrega==='delivery'?`<tr><td style="padding:3px 4px;color:#444">Endereço</td><td style="padding:3px 4px;text-align:right">${end}, ${bairro}</td></tr>`:''}

function imprimirComanda(){
  const pa = document.getElementById('print-area');
  pa.style.display = 'block';
  window.print();
  setTimeout(() => { pa.style.display = 'none'; }, 1500);
}


function voltarParaForm(){
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('cart-view').style.display='block';
  document.getElementById('cart-title').textContent='🛒 Carrinho';
  renderResumo();
}

function resetComanda(){
  if(!confirm('Reiniciar numeração das comandas do zero?')) return;
  localStorage.setItem('pb_ultima_comanda','0');
  preencherComanda();
  showToastComanda('↺ Numeração reiniciada!');
}

function getNextComanda(){
function peekNextComanda(){
  // Only peek — don't increment
  try{
    const saved = parseInt(localStorage.getItem('pb_ultima_comanda')||'0');
    return String(saved + 1).padStart(3,'0');
  }catch(e){ return '001'; }
}

function consumirComanda(){
  // Increment and return — call when pedido is confirmed
  try{
    const saved = parseInt(localStorage.getItem('pb_ultima_comanda')||'0');
    const next = saved + 1;
    localStorage.setItem('pb_ultima_comanda', next);
    return String(next).padStart(3,'0');
  }catch(e){ return '001'; }
}

function preencherComanda(){
  const num = peekNextComanda();
  const input = document.getElementById('f-comanda');
  if(input){ input.value = parseInt(num); syncComanda(num); }
}

function novoPedido(){
  cart=[];entrega='';freteVal=0;freteSet=false;
  document.querySelectorAll('.item-card').forEach(c=>c.classList.remove('has-items'));
  document.querySelectorAll('[id^="entries-"]').forEach(el=>el.innerHTML='');
  document.querySelectorAll('[id^="addmore-"]').forEach(el=>el.style.display='none');
  document.querySelectorAll('[id^="badge-"]').forEach(el=>{el.classList.remove('show');el.textContent='0';});
  ['f-nome','f-comanda','f-tel','f-obs','f-end','f-bairro','f-frete'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-pagto').value='';
  document.getElementById('btn-ret').classList.remove('on');
  document.getElementById('btn-del').classList.remove('on');
  document.getElementById('delivery-fields').style.display='none';
  document.querySelectorAll('.frete-opt').forEach(b=>b.classList.remove('on'));
  document.getElementById('frete-custom').style.display='none';
  document.querySelectorAll('.form-input.err').forEach(el=>el.classList.remove('err'));
  document.getElementById('err-msg').classList.remove('show');
  updCartBtn();fecharCarrinho();
  preencherComanda();
}

function goSec(id,btn){
  document.getElementById(id).scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
