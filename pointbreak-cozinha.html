<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="30">
<title>Cozinha — Point Break</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0d;--surface:#13151a;--card:#1a1d24;--border:#252830;
  --gold:#e8a020;--gold2:#f5b83d;
  --green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;
  --text:#f1f2f4;--muted:#6b7280;
  --font:'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* HEADER */
.header{
  background:linear-gradient(135deg,#14100a,#0a0b0d);
  border-bottom:2px solid var(--gold);
  padding:10px 20px;
  display:flex;align-items:center;gap:14px;
  height:64px;
}
.header img{width:44px;height:44px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(232,160,32,0.4))}
.header h1{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.clock{font-size:28px;font-weight:900;color:var(--gold2);letter-spacing:2px;font-variant-numeric:tabular-nums}
.btn-hist{background:transparent;border:1.5px solid var(--gold);border-radius:8px;color:var(--gold);font-family:var(--font);font-size:13px;font-weight:700;padding:8px 16px;cursor:pointer;transition:all 0.15s;letter-spacing:0.5px}
.btn-hist:hover{background:var(--gold);color:#111}
.btn-limpar{background:transparent;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--font);font-size:13px;font-weight:700;padding:8px 14px;cursor:pointer;transition:all 0.15s}
.btn-limpar:hover{border-color:var(--red);color:var(--red)}

/* TABS STATUS */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:var(--font);font-size:14px;font-weight:700;padding:12px 20px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:7px;letter-spacing:0.3px}
.tab:hover{color:var(--text)}
.tab.active{border-bottom-color:var(--gold);color:var(--gold)}
.tab-count{background:var(--border);color:var(--muted);font-size:11px;font-weight:900;border-radius:12px;padding:2px 7px;min-width:22px;text-align:center}
.tab.active .tab-count{background:var(--gold);color:#111}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:14px;
  padding:16px 20px;
  overflow-y:auto;
  height:calc(100vh - 64px - 49px);
}

/* PEDIDO CARD */
.pedido-card{
  background:var(--card);border:2px solid var(--border);border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;
  transition:all 0.25s;animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pedido-card.aguardando{border-color:#f97316;box-shadow:0 0 0 1px #f9731622}
.pedido-card.preparo{border-color:#3b82f6;box-shadow:0 0 0 1px #3b82f622}
.pedido-card.pronto{border-color:#22c55e;box-shadow:0 0 0 1px #22c55e22;opacity:0.7}

.card-header{
  padding:12px 14px 10px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.card-num{
  font-size:22px;font-weight:900;color:var(--gold);
  font-variant-numeric:tabular-nums;letter-spacing:1px;
}
.card-nome{font-size:15px;font-weight:700;flex:1}
.card-hora{font-size:12px;color:var(--muted);white-space:nowrap}
.card-tipo{
  font-size:11px;font-weight:700;border-radius:6px;padding:3px 8px;
  white-space:nowrap;
}
.card-tipo.retirada{background:#1e1a0a;color:var(--gold)}
.card-tipo.delivery{background:#0a1a2e;color:var(--blue)}

.card-status-bar{
  padding:8px 14px;
  font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.card-status-bar.aguardando{background:#1f1008;color:var(--orange)}
.card-status-bar.preparo{background:#080e1f;color:var(--blue)}
.card-status-bar.pronto{background:#071a0e;color:var(--green)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.aguardando .status-dot{background:var(--orange);animation:blink 1s infinite}
.preparo .status-dot{background:var(--blue);animation:blink 1.5s infinite}
.pronto .status-dot{background:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

.timer{margin-left:auto;font-size:13px;font-weight:900;font-variant-numeric:tabular-nums}
.timer.urgente{color:var(--red)}

.card-itens{padding:12px 14px;flex:1;overflow-y:auto;max-height:220px}
.card-item{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.card-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.ci-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.ci-qty{background:var(--gold);color:#111;font-size:11px;font-weight:900;border-radius:4px;padding:1px 6px;flex-shrink:0}
.ci-nome{font-size:13px;font-weight:700;flex:1}
.ci-sub{font-size:12px;color:var(--gold2);font-weight:700;white-space:nowrap}
.ci-mods{font-size:11px;margin-top:3px;line-height:1.5}
.ci-rem{color:#f87171}
.ci-add{color:#4ade80}
.ci-obs{color:var(--muted);font-style:italic}

.card-footer{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card-total{font-size:14px;font-weight:900;color:var(--gold2);margin-right:auto}
.btn-status{
  border:none;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:700;
  padding:8px 14px;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px;
}
.btn-preparo{background:#0d1830;color:var(--blue);border:1.5px solid var(--blue)}
.btn-preparo:hover{background:var(--blue);color:#fff}
.btn-pronto{background:#071a0e;color:var(--green);border:1.5px solid var(--green)}
.btn-pronto:hover{background:var(--green);color:#111}
.btn-del{background:transparent;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:8px 10px;cursor:pointer;transition:all 0.15s}
.btn-del:hover{border-color:var(--red);color:var(--red)}
.btn-impr{background:transparent;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:8px 10px;cursor:pointer;transition:all 0.15s}
.btn-impr:hover{border-color:var(--gold);color:var(--gold)}

/* EMPTY */
.empty{
  grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);
}
.empty-icon{font-size:56px;margin-bottom:12px}
.empty p{font-size:16px;font-weight:600}

/* MODAL HISTÓRICO */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:500;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.ov.show{display:flex}
.hist-modal{background:var(--surface);border:2px solid var(--gold);border-radius:16px;max-width:800px;width:100%;margin:auto;overflow:hidden}
.hist-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.hist-head h2{font-size:20px;font-weight:900;color:var(--gold);letter-spacing:1px;flex:1}
.btn-close{background:var(--card);border:none;border-radius:8px;color:var(--muted);font-size:20px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-close:hover{color:var(--text)}
.hist-body{padding:20px 22px;max-height:80vh;overflow-y:auto}

/* CARDS MÉTRICAS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.metric-val{font-size:26px;font-weight:900;color:var(--gold);line-height:1}
.metric-lbl{font-size:12px;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

/* TOP ITENS */
.top-itens{margin-bottom:20px}
.top-itens h3{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.top-item-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.top-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:8px;overflow:hidden}
.top-bar{height:100%;background:var(--gold);border-radius:4px;transition:width 0.5s}
.top-item-name{font-size:13px;font-weight:700;min-width:160px}
.top-item-qty{font-size:13px;color:var(--gold2);font-weight:900;min-width:30px;text-align:right}

/* LISTA PEDIDOS HIST */
.hist-pedido{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.hp-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hp-num{font-size:16px;font-weight:900;color:var(--gold)}
.hp-nome{font-size:14px;font-weight:700;flex:1}
.hp-hora{font-size:12px;color:var(--muted)}
.hp-total{font-size:15px;font-weight:900;color:var(--gold2)}
.hp-items{font-size:12px;color:var(--muted);line-height:1.6}
.hp-status{display:inline-block;font-size:11px;font-weight:700;border-radius:5px;padding:2px 8px;margin-top:4px}
.hp-status.aguardando{background:#1f1008;color:var(--orange)}
.hp-status.preparo{background:#080e1f;color:var(--blue)}
.hp-status.pronto{background:#071a0e;color:var(--green)}

.btn-export{background:var(--gold);color:#111;border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:900;padding:12px 20px;cursor:pointer;width:100%;margin-top:14px;letter-spacing:0.5px}
.btn-export:hover{background:var(--gold2)}
.btn-limpar-hist{background:transparent;border:1.5px solid var(--red);border-radius:8px;color:var(--red);font-family:var(--font);font-size:13px;font-weight:700;padding:10px 16px;cursor:pointer;margin-top:8px;width:100%}
.btn-limpar-hist:hover{background:#1f0808}

/* PRINT */
@media print{
  body *{visibility:hidden!important}
  #print-area,#print-area *{visibility:visible!important}
  #print-area{position:fixed;inset:0;background:white!important;color:black!important;padding:16px;font-family:'Courier New',monospace;font-size:12px}
}
#print-area{display:none}
.pr-c{text-align:center;margin-bottom:6px}
.pr-l{border-top:1px dashed #000;margin:5px 0}
.pr-r{display:flex;justify-content:space-between;margin:2px 0}
.pr-b{font-weight:bold}
</style>

<script>
const LOGO_B64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAANwA..."; // ref only

// ==================== ESTADO ====================
let pedidos = []; // lista de pedidos ativos (cozinha)
let tabAtiva = 'todos';
let timers = {};

// ==================== RELÓGIO ====================
function updClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updClock, 1000);
updClock();

// ==================== BROADCAST (recebe do cardápio) ====================
const CANAL = new BroadcastChannel('pointbreak_pedidos');
CANAL.onmessage = (e) => {
  if(e.data.tipo === 'novo_pedido'){
    const p = e.data.pedido;
    if(!pedidos.find(x=>x.uid===p.uid)){
      pedidos.push(p);
      salvarPedidosAtivos();
      renderBoard();
      notificar(p);
    }
  }
};

// ==================== PERSISTÊNCIA ====================
function salvarPedidosAtivos(){
  try{ localStorage.setItem('pb_cozinha_ativos', JSON.stringify(pedidos)); }catch(e){}
}
function carregarPedidosAtivos(){
  try{
    const raw = localStorage.getItem('pb_cozinha_ativos');
    if(raw) pedidos = JSON.parse(raw);
  }catch(e){ pedidos=[]; }
}

function getHistoricoHoje(){
  try{
    const hoje = new Date().toLocaleDateString('pt-BR');
    const raw = localStorage.getItem('pb_historico_'+hoje);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}

// ==================== RENDER ====================
function setTab(tab){
  tabAtiva = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderBoard();
}

function renderBoard(){
  const board = document.getElementById('board');
  const filtered = tabAtiva==='todos' ? pedidos : pedidos.filter(p=>p.status===tabAtiva);

  // Counts
  document.getElementById('cnt-todos').textContent = pedidos.length;
  document.getElementById('cnt-aguardando').textContent = pedidos.filter(p=>p.status==='aguardando').length;
  document.getElementById('cnt-preparo').textContent = pedidos.filter(p=>p.status==='preparo').length;
  document.getElementById('cnt-pronto').textContent = pedidos.filter(p=>p.status==='pronto').length;

  if(!filtered.length){
    board.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><p>${tabAtiva==='todos'?'Nenhum pedido ainda hoje':'Nenhum pedido nessa categoria'}</p></div>`;
    return;
  }

  board.innerHTML = filtered.map(p => renderCard(p)).join('');
  // Start timers
  filtered.forEach(p => startTimer(p));
}

function renderCard(p){
  const statusLabel = {aguardando:'🟠 Aguardando',preparo:'🔵 Em Preparo',pronto:'🟢 Pronto'}[p.status];
  const tipoLabel = p.entrega==='delivery'?'🛵 Delivery':'🏠 Retirada';
  const tipoClass = p.entrega==='delivery'?'delivery':'retirada';

  const itensHtml = p.itens.map(it=>{
    let mods = '';
    if(it.removed&&it.removed.length) mods+=`<span class="ci-rem">− ${it.removed.join(', ')}</span> `;
    if(it.extras&&it.extras.length) mods+=`<span class="ci-add">+ ${it.extras.map(x=>x.nome).join(', ')}</span>`;
    if(it.sabor) mods+=(mods?' · ':'')+`Sabor: ${it.sabor}`;
    if(it.obs) mods+=(mods?'<br>':'')+`<span class="ci-obs">${it.obs}</span>`;
    return `<div class="card-item">
      <div class="ci-row">
        <span class="ci-qty">${it.qty}x</span>
        <span class="ci-nome">${it.nome}</span>
        <span class="ci-sub">R$ ${it.subtotal.toFixed(2).replace('.',',')}</span>
      </div>
      ${mods?`<div class="ci-mods">${mods}</div>`:''}
    </div>`;
  }).join('');

  const btns = p.status==='aguardando'
    ? `<button class="btn-status btn-preparo" onclick="setStatus('${p.uid}','preparo')">🔵 Iniciar Preparo</button>
       <button class="btn-status btn-pronto" onclick="setStatus('${p.uid}','pronto')">🟢 Pronto</button>`
    : p.status==='preparo'
    ? `<button class="btn-status btn-pronto" onclick="setStatus('${p.uid}','pronto')">🟢 Marcar Pronto</button>`
    : `<button class="btn-status btn-preparo" onclick="setStatus('${p.uid}','aguardando')">↩️ Reabrir</button>`;

  return `<div class="pedido-card ${p.status}" id="pc-${p.uid}">
    <div class="card-header">
      <div class="card-num">#${p.comanda}</div>
      <div class="card-nome">${p.nome}</div>
      <div class="card-tipo ${tipoClass}">${tipoLabel}</div>
      <div class="card-hora">${p.hora}</div>
    </div>
    <div class="card-status-bar ${p.status}">
      <span class="status-dot"></span>
      ${statusLabel}
      <span class="timer" id="timer-${p.uid}">00:00</span>
    </div>
    <div class="card-itens">${itensHtml}</div>
    <div class="card-footer">
      <span class="card-total">Total: R$ ${p.total.toFixed(2).replace('.',',')}</span>
      ${btns}
      <button class="btn-impr" onclick="imprimirPedido('${p.uid}')">🖨️</button>
      <button class="btn-del" onclick="delPedido('${p.uid}')">✕</button>
    </div>
  </div>`;
}

// ==================== TIMER ====================
function startTimer(p){
  if(timers[p.uid]) clearInterval(timers[p.uid]);
  timers[p.uid] = setInterval(()=>{
    const el = document.getElementById('timer-'+p.uid);
    if(!el){ clearInterval(timers[p.uid]); return; }
    const elapsed = Math.floor((Date.now()-p.timestamp)/1000);
    const m = Math.floor(elapsed/60).toString().padStart(2,'0');
    const s = (elapsed%60).toString().padStart(2,'0');
    el.textContent = m+':'+s;
    el.classList.toggle('urgente', elapsed>900 && p.status!=='pronto'); // 15min
  }, 1000);
}

// ==================== AÇÕES ====================
function setStatus(uid, status){
  const p = pedidos.find(x=>x.uid===uid);
  if(!p) return;
  p.status = status;
  // Atualiza histórico também
  atualizarStatusHistorico(uid, status);
  salvarPedidosAtivos();
  renderBoard();
}

function atualizarStatusHistorico(uid, status){
  try{
    const hoje = new Date().toLocaleDateString('pt-BR');
    const key = 'pb_historico_'+hoje;
    const raw = localStorage.getItem(key);
    if(!raw) return;
    const lista = JSON.parse(raw);
    const item = lista.find(x=>x.uid===uid);
    if(item) item.status = status;
    localStorage.setItem(key, JSON.stringify(lista));
  }catch(e){}
}

function delPedido(uid){
  if(!confirm('Remover este pedido da fila?')) return;
  pedidos = pedidos.filter(x=>x.uid!==uid);
  if(timers[uid]) clearInterval(timers[uid]);
  salvarPedidosAtivos();
  renderBoard();
}

function limparProntos(){
  if(!confirm('Remover todos os pedidos prontos da fila?')) return;
  pedidos.filter(p=>p.status==='pronto').forEach(p=>{ if(timers[p.uid]) clearInterval(timers[p.uid]); });
  pedidos = pedidos.filter(p=>p.status!=='pronto');
  salvarPedidosAtivos();
  renderBoard();
}

function notificar(p){
  if('Notification' in window && Notification.permission==='granted'){
    new Notification('Novo Pedido — Point Break',{body:`#${p.comanda} — ${p.nome}`,icon:''});
  }
}

// ==================== IMPRIMIR PEDIDO ====================
function imprimirPedido(uid){
  const p = pedidos.find(x=>x.uid===uid);
  if(!p) return;
  let linhas = '';
  p.itens.forEach(it=>{
    linhas += `<div class="pr-r"><span>${it.qty}x ${it.nome}</span><span>R$ ${it.subtotal.toFixed(2).replace('.',',')}</span></div>`;
    if(it.removed&&it.removed.length) linhas+=`<div style="font-size:11px;padding-left:10px">− Retirar: ${it.removed.join(', ')}</div>`;
    if(it.extras&&it.extras.length) linhas+=`<div style="font-size:11px;padding-left:10px">+ Adicional: ${it.extras.map(x=>x.nome).join(', ')}</div>`;
    if(it.sabor) linhas+=`<div style="font-size:11px;padding-left:10px">Sabor: ${it.sabor}</div>`;
    if(it.obs) linhas+=`<div style="font-size:11px;padding-left:10px">Obs: ${it.obs}</div>`;
  });
  if(p.frete>0) linhas+=`<div class="pr-r"><span>Frete</span><span>R$ ${p.frete.toFixed(2).replace('.',',')}</span></div>`;
  document.getElementById('print-area').innerHTML=`
    <div style="font-family:'Courier New',monospace;font-size:12px;color:black;background:white;padding:16px;max-width:320px">
    <div class="pr-c pr-b" style="font-size:15px">POINT BREAK — CARNAPIN</div>
    <div class="pr-c">Comanda #${p.comanda} | ${new Date().toLocaleDateString('pt-BR')} ${p.hora}</div>
    <div class="pr-l"></div>
    <div class="pr-r"><span>Cliente:</span><span>${p.nome}</span></div>
    <div class="pr-r"><span>Entrega:</span><span>${p.entrega==='delivery'?'Delivery':'Retirada'}</span></div>
    <div class="pr-r"><span>Pagamento:</span><span>${p.pagto}</span></div>
    <div class="pr-l"></div>
    <div class="pr-b">ITENS:</div>${linhas}
    <div class="pr-l"></div>
    <div class="pr-r pr-b"><span>TOTAL</span><span>R$ ${p.total.toFixed(2).replace('.',',')}</span></div>
    <div class="pr-l"></div>
    <div class="pr-c">Obrigado pela preferência!</div>
    </div>`;
  document.getElementById('print-area').style.display='block';
  window.print();
  setTimeout(()=>document.getElementById('print-area').style.display='none',1200);
}

// ==================== HISTÓRICO ====================
function abrirHistorico(){
  const hoje = new Date().toLocaleDateString('pt-BR');
  document.getElementById('hist-data').textContent = hoje;
  const lista = getHistoricoHoje();
  renderHistorico(lista);
  document.getElementById('ov-hist').classList.add('show');
}
function fecharHistorico(){ document.getElementById('ov-hist').classList.remove('show'); }
function fecharSeOv(e){ if(e.target===document.getElementById('ov-hist')) fecharHistorico(); }

function renderHistorico(lista){
  const body = document.getElementById('hist-body');
  if(!lista.length){
    body.innerHTML='<p style="text-align:center;color:var(--muted);padding:30px">Nenhum pedido registrado hoje.</p>';
    return;
  }

  // Métricas
  const totalGeral = lista.reduce((s,p)=>s+p.total,0);
  const totalPedidos = lista.length;
  const totalItens = lista.reduce((s,p)=>s+p.itens.reduce((x,i)=>x+i.qty,0),0);
  const ticketMedio = totalGeral/totalPedidos;
  const delivery = lista.filter(p=>p.entrega==='delivery').length;

  // Contagem por pagamento
  const pagtos = {};
  lista.forEach(p=>{ pagtos[p.pagto]=(pagtos[p.pagto]||0)+1; });
  const pagtoStr = Object.entries(pagtos).map(([k,v])=>`${k}: ${v}`).join(' · ');

  // Top itens
  const itemCount = {};
  lista.forEach(p=>p.itens.forEach(it=>{ itemCount[it.nome]=(itemCount[it.nome]||0)+it.qty; }));
  const topItens = Object.entries(itemCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxQty = topItens[0]?.[1]||1;

  let html = `
  <div class="metrics">
    <div class="metric"><div class="metric-val">R$ ${totalGeral.toFixed(2).replace('.',',')}</div><div class="metric-lbl">Total do Dia</div></div>
    <div class="metric"><div class="metric-val">${totalPedidos}</div><div class="metric-lbl">Pedidos</div></div>
    <div class="metric"><div class="metric-val">R$ ${ticketMedio.toFixed(2).replace('.',',')}</div><div class="metric-lbl">Ticket Médio</div></div>
    <div class="metric"><div class="metric-val">${totalItens}</div><div class="metric-lbl">Itens Vendidos</div></div>
    <div class="metric"><div class="metric-val">${delivery}</div><div class="metric-lbl">Deliveries</div></div>
  </div>
  <p style="font-size:12px;color:var(--muted);margin-bottom:16px">Pagamentos: ${pagtoStr}</p>

  <div class="top-itens">
    <h3>🏆 Itens mais pedidos</h3>
    ${topItens.map(([nome,qty])=>`
    <div class="top-item-row">
      <span class="top-item-name">${nome}</span>
      <div class="top-bar-wrap"><div class="top-bar" style="width:${Math.round(qty/maxQty*100)}%"></div></div>
      <span class="top-item-qty">${qty}x</span>
    </div>`).join('')}
  </div>

  <div class="top-itens">
    <h3>📋 Pedidos do Dia</h3>
    ${lista.slice().reverse().map(p=>`
    <div class="hist-pedido">
      <div class="hp-head">
        <span class="hp-num">#${p.comanda}</span>
        <span class="hp-nome">${p.nome}</span>
        <span class="hp-hora">${p.hora}</span>
        <span class="hp-total">R$ ${p.total.toFixed(2).replace('.',',')}</span>
      </div>
      <div class="hp-items">${p.itens.map(it=>`${it.qty}x ${it.nome}`).join(' · ')}</div>
      <span class="hp-status ${p.status}">${p.status==='aguardando'?'Aguardando':p.status==='preparo'?'Em Preparo':'Pronto'}</span>
    </div>`).join('')}
  </div>

  <button class="btn-export" onclick="exportarCSV()">📥 Exportar Relatório (.csv)</button>
  <button class="btn-limpar-hist" onclick="limparHistorico()">🗑️ Limpar Histórico do Dia</button>`;

  body.innerHTML = html;
}

function exportarCSV(){
  const hoje = new Date().toLocaleDateString('pt-BR');
  const lista = getHistoricoHoje();
  let csv = 'Comanda,Cliente,Hora,Entrega,Pagamento,Itens,Total\n';
  lista.forEach(p=>{
    const itensStr = p.itens.map(it=>`${it.qty}x ${it.nome}`).join(' | ');
    csv += `"#${p.comanda}","${p.nome}","${p.hora}","${p.entrega}","${p.pagto}","${itensStr}","R$ ${p.total.toFixed(2)}"\n`;
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;a.download=`pointbreak_${hoje.replace(/\//g,'-')}.csv`;
  a.click();URL.revokeObjectURL(url);
}

function limparHistorico(){
  if(!confirm('Tem certeza? O histórico de hoje será apagado.')) return;
  const hoje = new Date().toLocaleDateString('pt-BR');
  localStorage.removeItem('pb_historico_'+hoje);
  fecharHistorico();
}

// ==================== NOTIFICAÇÕES ====================
if('Notification' in window && Notification.permission==='default'){
  Notification.requestPermission();
}

// ==================== INIT ====================
carregarPedidosAtivos();
renderBoard();
setInterval(()=>{ renderBoard(); }, 10000); // auto-refresh a cada 10s
</script>

<div id="btn-instalar" style="display:none;position:fixed;bottom:20px;right:20px;z-index:150;
  background:#e8a020;color:#111;border:none;border-radius:12px;font-weight:900;font-size:13px;
  padding:11px 18px;cursor:pointer;box-shadow:0 4px 20px rgba(232,160,32,0.5);
  align-items:center;gap:8px" onclick="instalarApp()">
  📲 Instalar App
</div>
<script>
// ===== SERVICE WORKER (PWA offline) =====
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'pointbreak-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(()=>caches.match('/'))));
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ===== INSTALL PROMPT =====
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btn-instalar')?.style.setProperty('display','flex');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('btn-instalar')?.style.setProperty('display','none');
});
function instalarApp(){
  if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.then(()=>{ deferredPrompt=null; }); }
}
</script>
