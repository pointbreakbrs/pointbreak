<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozinha — Point Break</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0b0d;--surface:#13151a;--card:#1a1d24;--border:#252830;--gold:#e8a020;--gold2:#f5b83d;--green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;--text:#f1f2f4;--muted:#6b7280;--font:'Segoe UI',system-ui,sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
.header{background:linear-gradient(135deg,#14100a,#0a0b0d);border-bottom:2px solid var(--gold);padding:10px 16px;display:flex;align-items:center;gap:12px;height:60px}
.header img{width:40px;height:40px;object-fit:contain}
.header h1{font-size:20px;font-weight:900;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.clock{font-size:24px;font-weight:900;color:var(--gold2);letter-spacing:2px;font-variant-numeric:tabular-nums}
.btn{background:transparent;border:1.5px solid var(--gold);border-radius:8px;color:var(--gold);font-family:var(--font);font-size:12px;font-weight:700;padding:7px 12px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--gold);color:#111}
.btn-gray{border-color:var(--border);color:var(--muted)}
.btn-gray:hover{border-color:var(--red);color:var(--red);background:transparent}
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:var(--font);font-size:13px;font-weight:700;padding:11px 16px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.tab.active{border-bottom-color:var(--gold);color:var(--gold)}
.tc{background:var(--border);color:var(--muted);font-size:11px;font-weight:900;border-radius:10px;padding:2px 6px;min-width:20px;text-align:center}
.tab.active .tc{background:var(--gold);color:#111}
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;padding:14px 16px;overflow-y:auto;height:calc(100vh - 60px - 46px)}
.card{background:var(--card);border:2px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;animation:fi 0.3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card.aguardando{border-color:var(--orange)}
.card.preparo{border-color:var(--blue)}
.card.pronto{border-color:var(--green);opacity:0.7}
.ch{padding:11px 13px 9px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.cnum{font-size:20px;font-weight:900;color:var(--gold)}
.cnome{font-size:14px;font-weight:700;flex:1}
.chora{font-size:11px;color:var(--muted);white-space:nowrap}
.ctipo{font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;white-space:nowrap}
.ctipo.retirada{background:#1e1a0a;color:var(--gold)}
.ctipo.delivery{background:#0a1a2e;color:var(--blue)}
.csbar{padding:7px 13px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.csbar.aguardando{background:#1f1008;color:var(--orange)}
.csbar.preparo{background:#080e1f;color:var(--blue)}
.csbar.pronto{background:#071a0e;color:var(--green)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.aguardando .sdot{background:var(--orange);animation:bl 1s infinite}
.preparo .sdot{background:var(--blue);animation:bl 1.5s infinite}
.pronto .sdot{background:var(--green)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.2}}
.ctimer{margin-left:auto;font-size:12px;font-weight:900;font-variant-numeric:tabular-nums}
.ctimer.urg{color:var(--red)}
.citens{padding:11px 13px;flex:1;overflow-y:auto;max-height:200px}
.ci{margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.ci:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.cirow{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
.ciqty{background:var(--gold);color:#111;font-size:10px;font-weight:900;border-radius:4px;padding:1px 5px;flex-shrink:0}
.cinome{font-size:13px;font-weight:700;flex:1}
.cisub{font-size:11px;color:var(--gold2);font-weight:700;white-space:nowrap}
.cimods{font-size:11px;margin-top:2px;line-height:1.4}
.cft{padding:11px 13px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ctotal{font-size:13px;font-weight:900;color:var(--gold2);margin-right:auto}
.bst{border:none;border-radius:7px;font-family:var(--font);font-size:11px;font-weight:700;padding:7px 12px;cursor:pointer;transition:all 0.15s}
.bprep{background:#0d1830;color:var(--blue);border:1.5px solid var(--blue)}
.bprep:hover{background:var(--blue);color:#fff}
.bpron{background:#071a0e;color:var(--green);border:1.5px solid var(--green)}
.bpron:hover{background:var(--green);color:#111}
.bdel{background:transparent;border:1.5px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;padding:7px 9px;cursor:pointer}
.bdel:hover{border-color:var(--red);color:var(--red)}
.bimp{background:transparent;border:1.5px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;padding:7px 9px;cursor:pointer}
.bimp:hover{border-color:var(--gold);color:var(--gold)}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:10px}
/* MODAL HISTÓRICO */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:500;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.ov.show{display:flex}
.hm{background:var(--surface);border:2px solid var(--gold);border-radius:14px;max-width:780px;width:100%;margin:auto}
.hh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.hh h2{font-size:18px;font-weight:900;color:var(--gold);flex:1}
.bc{background:var(--card);border:none;border-radius:8px;color:var(--muted);font-size:20px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hb{padding:18px 20px;max-height:80vh;overflow-y:auto}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.mv{font-size:22px;font-weight:900;color:var(--gold);line-height:1}
.ml{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.tit{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:14px}
.tbrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tbwrap{flex:1;background:var(--border);border-radius:3px;height:7px;overflow:hidden}
.tbbar{height:100%;background:var(--gold);border-radius:3px}
.tbnome{font-size:12px;font-weight:700;min-width:140px}
.tbqty{font-size:12px;color:var(--gold2);font-weight:900;min-width:28px;text-align:right}
.hp{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.hpr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hpn{font-size:15px;font-weight:900;color:var(--gold)}
.hpnome{font-size:13px;font-weight:700;flex:1}
.hph{font-size:11px;color:var(--muted)}
.hpt{font-size:14px;font-weight:900;color:var(--gold2)}
.hpi{font-size:11px;color:var(--muted);line-height:1.5}
.hps{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;margin-top:3px}
.hps.aguardando{background:#1f1008;color:var(--orange)}
.hps.preparo{background:#080e1f;color:var(--blue)}
.hps.pronto{background:#071a0e;color:var(--green)}
.bexp{background:var(--gold);color:#111;border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:900;padding:12px;cursor:pointer;width:100%;margin-top:12px}
.bexp:hover{background:var(--gold2)}
.bclh{background:transparent;border:1.5px solid var(--red);border-radius:8px;color:var(--red);font-family:var(--font);font-size:12px;font-weight:700;padding:10px;cursor:pointer;margin-top:6px;width:100%}
@media print{body *{visibility:hidden!important}#print-area,#print-area *{visibility:visible!important}#print-area{position:fixed;inset:0;background:white!important;color:black!important;padding:12px;font-family:'Courier New',monospace;font-size:12px}@page{margin:4mm;size:80mm auto}}
#print-area{display:none}
.pr-c{text-align:center;margin-bottom:6px}
.pr-l{border-top:1px dashed #000;margin:5px 0}
.pr-r{display:flex;justify-content:space-between;margin:2px 0}
.pr-b{font-weight:bold}
</style>
</head>

<script>
let pedidos=[],tabAtiva='todos',timers={};
const CANAL=new BroadcastChannel('pointbreak_pedidos');
CANAL.onmessage=e=>{
  if(e.data.tipo==='novo_pedido'){
    const p=e.data.pedido;
    if(!pedidos.find(x=>x.uid===p.uid)){pedidos.push(p);salvar();renderBoard();}
  }
};
function salvar(){try{localStorage.setItem('pb_cozinha_ativos',JSON.stringify(pedidos));}catch(e){}}
function carregar(){try{const r=localStorage.getItem('pb_cozinha_ativos');if(r)pedidos=JSON.parse(r);}catch(e){pedidos=[];}}
function getHist(){try{const h=new Date().toLocaleDateString('pt-BR');const r=localStorage.getItem('pb_historico_'+h);return r?JSON.parse(r):[];}catch(e){return[];}}
function updClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
setInterval(updClock,1000);updClock();
function setTab(t){tabAtiva=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');renderBoard();}
function renderBoard(){
  const board=document.getElementById('board');
  const list=tabAtiva==='todos'?pedidos:pedidos.filter(p=>p.status===tabAtiva);
  document.getElementById('ct-todos').textContent=pedidos.length;
  document.getElementById('ct-aguardando').textContent=pedidos.filter(p=>p.status==='aguardando').length;
  document.getElementById('ct-preparo').textContent=pedidos.filter(p=>p.status==='preparo').length;
  document.getElementById('ct-pronto').textContent=pedidos.filter(p=>p.status==='pronto').length;
  if(!list.length){board.innerHTML='<div class="empty"><div class="empty-icon">✅</div><p>'+(tabAtiva==='todos'?'Nenhum pedido ainda':'Nenhum pedido nessa categoria')+'</p></div>';return;}
  board.innerHTML=list.map(p=>renderCard(p)).join('');
  list.forEach(p=>startTimer(p));
}
function renderCard(p){
  const sl={aguardando:'🟠 Aguardando',preparo:'🔵 Em Preparo',pronto:'🟢 Pronto'}[p.status];
  const tc=p.entrega==='delivery'?'delivery':'retirada';
  const tl=p.entrega==='delivery'?'🛵 Delivery':'🏠 Retirada';
  const itens=p.itens.map(it=>{
    let m='';
    if(it.removed&&it.removed.length)m+=`<span style="color:#f87171">− ${it.removed.join(', ')}</span> `;
    if(it.extras&&it.extras.length)m+=`<span style="color:#4ade80">+ ${it.extras.map(x=>x.nome).join(', ')}</span>`;
    if(it.sabor)m+=(m?' · ':'')+`Sabor: ${it.sabor}`;
    if(it.obs)m+=(m?'<br>':'')+`<i style="color:#6b7280">${it.obs}</i>`;
    return `<div class="ci"><div class="cirow"><span class="ciqty">${it.qty}x</span><span class="cinome">${it.nome}</span><span class="cisub">R$ ${it.subtotal.toFixed(2).replace('.',',')}</span></div>${m?`<div class="cimods">${m}</div>`:''}</div>`;
  }).join('');
  const btns=p.status==='aguardando'
    ?`<button class="bst bprep" onclick="setSt('${p.uid}','preparo')">🔵 Iniciar</button><button class="bst bpron" onclick="setSt('${p.uid}','pronto')">🟢 Pronto</button>`
    :p.status==='preparo'
    ?`<button class="bst bpron" onclick="setSt('${p.uid}','pronto')">🟢 Marcar Pronto</button>`
    :`<button class="bst bprep" onclick="setSt('${p.uid}','aguardando')">↩️ Reabrir</button>`;
  return `<div class="card ${p.status}" id="pc-${p.uid}">
    <div class="ch"><div class="cnum">#${p.comanda}</div><div class="cnome">${p.nome}</div><div class="ctipo ${tc}">${tl}</div><div class="chora">${p.hora}</div></div>
    <div class="csbar ${p.status}"><span class="sdot"></span>${sl}<span class="ctimer" id="timer-${p.uid}">00:00</span></div>
    <div class="citens">${itens}</div>
    <div class="cft"><span class="ctotal">R$ ${p.total.toFixed(2).replace('.',',')}</span>${btns}<button class="bimp" onclick="imprimir('${p.uid}')">🖨️</button><button class="bdel" onclick="del('${p.uid}')">✕</button></div>
  </div>`;
}
function startTimer(p){
  if(timers[p.uid])clearInterval(timers[p.uid]);
  timers[p.uid]=setInterval(()=>{
    const el=document.getElementById('timer-'+p.uid);
    if(!el){clearInterval(timers[p.uid]);return;}
    const e=Math.floor((Date.now()-p.timestamp)/1000);
    el.textContent=String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
    el.classList.toggle('urg',e>900&&p.status!=='pronto');
  },1000);
}
function setSt(uid,status){
  const p=pedidos.find(x=>x.uid===uid);if(!p)return;
  p.status=status;
  try{const h=new Date().toLocaleDateString('pt-BR');const k='pb_historico_'+h;const r=localStorage.getItem(k);if(r){const l=JSON.parse(r);const i=l.find(x=>x.uid===uid);if(i)i.status=status;localStorage.setItem(k,JSON.stringify(l));}}catch(e){}
  salvar();renderBoard();
}
function del(uid){if(!confirm('Remover pedido?'))return;pedidos=pedidos.filter(x=>x.uid!==uid);if(timers[uid])clearInterval(timers[uid]);salvar();renderBoard();}
function limparProntos(){if(!confirm('Remover todos prontos?'))return;pedidos.filter(p=>p.status==='pronto').forEach(p=>{if(timers[p.uid])clearInterval(timers[p.uid]);});pedidos=pedidos.filter(p=>p.status!=='pronto');salvar();renderBoard();}
function imprimir(uid){
  const p=pedidos.find(x=>x.uid===uid);if(!p)return;
  let linhas='',total=0;
  p.itens.forEach(it=>{
    linhas+=`<div class="pr-r"><span>${it.qty}x ${it.nome}</span><span>R$ ${it.subtotal.toFixed(2).replace('.',',')}</span></div>`;
    if(it.removed&&it.removed.length)linhas+=`<div style="font-size:11px;padding-left:10px">− ${it.removed.join(', ')}</div>`;
    if(it.extras&&it.extras.length)linhas+=`<div style="font-size:11px;padding-left:10px">+ ${it.extras.map(x=>x.nome).join(', ')}</div>`;
    if(it.sabor)linhas+=`<div style="font-size:11px;padding-left:10px">Sabor: ${it.sabor}</div>`;
    if(it.obs)linhas+=`<div style="font-size:11px;padding-left:10px">Obs: ${it.obs}</div>`;
  });
  if(p.frete>0)linhas+=`<div class="pr-r"><span>Frete</span><span>R$ ${p.frete.toFixed(2).replace('.',',')}</span></div>`;
  const pa=document.getElementById('print-area');
  pa.innerHTML=`<div style="font-family:'Courier New',monospace;font-size:12px;color:black;background:white;padding:12px;max-width:320px">
    <div class="pr-c pr-b" style="font-size:14px">POINT BREAK</div>
    <div class="pr-c">Comanda #${p.comanda} | ${new Date().toLocaleDateString('pt-BR')} ${p.hora}</div>
    <div class="pr-l"></div>
    <div class="pr-r"><span>Cliente:</span><span>${p.nome}</span></div>
    <div class="pr-r"><span>Entrega:</span><span>${p.entrega==='delivery'?'Delivery':'Retirada'}</span></div>
    <div class="pr-r"><span>Pagamento:</span><span>${p.pagto}</span></div>
    <div class="pr-l"></div><div class="pr-b">ITENS:</div>${linhas}
    <div class="pr-l"></div>
    <div class="pr-r pr-b"><span>TOTAL</span><span>R$ ${p.total.toFixed(2).replace('.',',')}</span></div>
    <div class="pr-l"></div><div class="pr-c">Obrigado!</div></div>`;
  pa.style.cssText='display:block!important;position:fixed;top:0;left:0;width:100%;background:white;color:black;padding:12px;font-family:Courier New,monospace;font-size:12px;z-index:99999';
  setTimeout(()=>{window.print();setTimeout(()=>{pa.style.cssText='display:none';},800);},100);
}
function abrirHist(){
  const hoje=new Date().toLocaleDateString('pt-BR');
  document.getElementById('hist-data').textContent=hoje;
  const lista=getHist();
  if(!lista.length){document.getElementById('hb').innerHTML='<p style="text-align:center;color:var(--muted);padding:30px">Nenhum pedido hoje.</p>';document.getElementById('ov-hist').classList.add('show');return;}
  const tg=lista.reduce((s,p)=>s+p.total,0);
  const ti=lista.reduce((s,p)=>s+p.itens.reduce((x,i)=>x+i.qty,0),0);
  const td=lista.filter(p=>p.entrega==='delivery').length;
  const ic={};lista.forEach(p=>p.itens.forEach(it=>{ic[it.nome]=(ic[it.nome]||0)+it.qty;}));
  const top=Object.entries(ic).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const mx=top[0]?.[1]||1;
  const pg={};lista.forEach(p=>{pg[p.pagto]=(pg[p.pagto]||0)+1;});
  document.getElementById('hb').innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="mv">R$ ${tg.toFixed(2).replace('.',',')}</div><div class="ml">Total do Dia</div></div>
      <div class="metric"><div class="mv">${lista.length}</div><div class="ml">Pedidos</div></div>
      <div class="metric"><div class="mv">R$ ${(tg/lista.length).toFixed(2).replace('.',',')}</div><div class="ml">Ticket Médio</div></div>
      <div class="metric"><div class="mv">${ti}</div><div class="ml">Itens</div></div>
      <div class="metric"><div class="mv">${td}</div><div class="ml">Deliveries</div></div>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:4px">Pagamentos: ${Object.entries(pg).map(([k,v])=>k+': '+v).join(' · ')}</p>
    <div class="tit">🏆 Mais pedidos</div>
    ${top.map(([n,q])=>`<div class="tbrow"><span class="tbnome">${n}</span><div class="tbwrap"><div class="tbbar" style="width:${Math.round(q/mx*100)}%"></div></div><span class="tbqty">${q}x</span></div>`).join('')}
    <div class="tit">📋 Pedidos</div>
    ${lista.slice().reverse().map(p=>`<div class="hp"><div class="hpr"><span class="hpn">#${p.comanda}</span><span class="hpnome">${p.nome}</span><span class="hph">${p.hora}</span><span class="hpt">R$ ${p.total.toFixed(2).replace('.',',')}</span></div><div class="hpi">${p.itens.map(i=>i.qty+'x '+i.nome).join(' · ')}</div><span class="hps ${p.status}">${p.status==='aguardando'?'Aguardando':p.status==='preparo'?'Preparo':'Pronto'}</span></div>`).join('')}
    <button class="bexp" onclick="exportCSV()">📥 Exportar CSV</button>
    <button class="bclh" onclick="limparHist()">🗑️ Limpar Histórico</button>`;
  document.getElementById('ov-hist').classList.add('show');
}
function fecharHist(){document.getElementById('ov-hist').classList.remove('show');}
function fecharSeOv(e){if(e.target===document.getElementById('ov-hist'))fecharHist();}
function exportCSV(){
  const h=new Date().toLocaleDateString('pt-BR');
  const lista=getHist();
  let csv='Comanda,Cliente,Hora,Entrega,Pagamento,Itens,Total\n';
  lista.forEach(p=>{csv+=`"#${p.comanda}","${p.nome}","${p.hora}","${p.entrega}","${p.pagto}","${p.itens.map(i=>i.qty+'x '+i.nome).join(' | ')}","R$ ${p.total.toFixed(2)}"\n`;});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='pointbreak_'+h.replace(/\//g,'-')+'.csv';
  a.click();
}
function limparHist(){
  if(!confirm('Apagar histórico de hoje?'))return;
  localStorage.removeItem('pb_historico_'+new Date().toLocaleDateString('pt-BR'));
  fecharHist();
}
carregar();renderBoard();
setInterval(renderBoard,15000);
</script>
