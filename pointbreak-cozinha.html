<script>
const firebaseConfig = {
  apiKey: "AIzaSyB0Vb_lXfyMy44E29dRjZlihygq9",
  authDomain: "pointbreak-426d2.firebaseapp.com",
  databaseURL: "https://pointbreak-426d2-default-rtdb.firebaseio.com",
  projectId: "pointbreak-426d2",
  storageBucket: "pointbreak-426d2.firebasestorage.app",
  messagingSenderId: "1057881922750",
  appId: "1:1057881922750:web:c37b5fb65c3065"
};
firebase.initializeApp(firebaseConfig);
const DB = firebase.database();

// ===== FUNÇÕES FIREBASE =====
function fbEnviarPedido(pedido) {
  DB.ref('pedidos').push(pedido).catch(e => console.warn('Firebase erro:', e));
}
function fbOuvirPedidos(callback) {
  DB.ref('pedidos').on('value', snap => {
    const data = snap.val() || {};
    const lista = Object.entries(data).map(([key, val]) => ({...val, _fbKey: key}));
    callback(lista);
  });
}
function fbAtualizarStatus(fbKey, status) {
  DB.ref('pedidos/' + fbKey).update({ status }).catch(e => console.warn('Firebase erro:', e));
}
function fbRemoverPedido(fbKey) {
  DB.ref('pedidos/' + fbKey).remove().catch(e => console.warn('Firebase erro:', e));
}
function fbLimparProntos(pedidos) {
  pedidos.filter(p => p.status === 'pronto').forEach(p => {
    if(p._fbKey) DB.ref('pedidos/' + p._fbKey).remove();
  });
}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0b0d;--surf:#13151a;--card:#1a1d24;--border:#252830;
  --gold:#e8a020;--gold2:#f5b83d;
  --green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;
  --text:#f1f2f4;--muted:#6b7280;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,#14100a,#0a0b0d);
  border-bottom:3px solid var(--gold);
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  height:58px;position:sticky;top:0;z-index:100;
}
.hdr img{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(232,160,32,0.4))}
.hdr-title{flex:1}
.hdr-title h1{font-size:17px;font-weight:900;color:var(--gold);letter-spacing:1px;text-transform:uppercase;line-height:1}
.hdr-title p{font-size:10px;color:var(--muted);margin-top:1px}
.clock{font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:1px;font-variant-numeric:tabular-nums}

/* ── STATUS BAR ── */
.statusbar{
  background:var(--surf);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
}
.statusbar::-webkit-scrollbar{display:none}
.stat-chip{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  background:var(--card);border:1.5px solid var(--border);border-radius:20px;
  padding:5px 12px;font-size:12px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.stat-chip.active{border-color:var(--gold);background:#1e1a0a;color:var(--gold)}
.stat-chip .badge{
  background:var(--border);color:var(--muted);font-size:10px;font-weight:900;
  border-radius:10px;padding:1px 6px;min-width:20px;text-align:center;
}
.stat-chip.active .badge{background:var(--gold);color:#111}
.stat-chip.chip-orange.active{border-color:var(--orange);background:#1f1008;color:var(--orange)}
.stat-chip.chip-orange.active .badge{background:var(--orange);color:#111}
.stat-chip.chip-blue.active{border-color:var(--blue);background:#080e1f;color:var(--blue)}
.stat-chip.chip-blue.active .badge{background:var(--blue);color:#fff}
.stat-chip.chip-green.active{border-color:var(--green);background:#071a0e;color:var(--green)}
.stat-chip.chip-green.active .badge{background:var(--green);color:#111}

/* ── BOARD ── */
.board{
  overflow-y:auto;
  height:calc(100vh - 58px - 50px);
  padding:10px 12px 80px;
}

/* ── CARD PEDIDO ── */
.pcard{
  background:var(--card);border-radius:14px;
  margin-bottom:10px;overflow:hidden;
  border-left:4px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
  animation:fadeIn 0.3s ease;
  transition:border-color 0.2s;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pcard.aguardando{border-left-color:var(--orange)}
.pcard.preparo{border-left-color:var(--blue)}
.pcard.pronto{border-left-color:var(--green);opacity:0.75}

/* CARD HEADER */
.pcard-head{
  padding:10px 12px 8px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);
}
.pcard-num{
  font-size:24px;font-weight:900;color:var(--gold);
  line-height:1;letter-spacing:1px;min-width:52px;
}
.pcard-info{flex:1;min-width:0}
.pcard-nome{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-meta{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.chip-tipo{font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;white-space:nowrap}
.chip-tipo.retirada{background:#1e1a0a;color:var(--gold)}
.chip-tipo.delivery{background:#0a1a2e;color:var(--blue)}
.chip-origem{font-size:10px;color:var(--muted)}
.pcard-hora{font-size:11px;color:var(--muted);white-space:nowrap}

/* STATUS STRIP */
.pcard-strip{
  padding:6px 12px;
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
}
.pcard-strip.aguardando{background:#1f1008;color:var(--orange)}
.pcard-strip.preparo{background:#080e1f;color:var(--blue)}
.pcard-strip.pronto{background:#071a0e;color:var(--green)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.aguardando .sdot{background:var(--orange);animation:bl 1s infinite}
.preparo .sdot{background:var(--blue);animation:bl 1.5s infinite}
.pronto .sdot{background:var(--green)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.3}}
.timer{margin-left:auto;font-size:13px;font-weight:900;font-variant-numeric:tabular-nums}
.timer.urg{color:var(--red);animation:bl 0.8s infinite}

/* ITENS */
.pcard-itens{padding:8px 12px}
.ci{
  display:flex;align-items:flex-start;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--border);
}
.ci:last-child{border-bottom:none}
.ci-qty{
  background:var(--gold);color:#111;font-size:12px;font-weight:900;
  border-radius:5px;padding:2px 7px;flex-shrink:0;margin-top:1px;
}
.ci-body{flex:1}
.ci-nome{font-size:14px;font-weight:700;color:var(--text)}
.ci-mods{font-size:11px;margin-top:3px;line-height:1.5}
.ci-rem{color:#f87171}
.ci-add{color:#4ade80}
.ci-obs{color:var(--muted);font-style:italic}
.ci-sub{font-size:13px;font-weight:900;color:var(--gold2);white-space:nowrap;margin-left:auto}

/* CARD FOOTER */
.pcard-foot{
  padding:8px 12px 10px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.pcard-total{font-size:13px;font-weight:900;color:var(--gold2);margin-right:auto}
.pbtn{
  border:none;border-radius:8px;font-family:var(--font);
  font-size:12px;font-weight:700;padding:8px 12px;cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;gap:4px;
}
.pbtn-prep{background:#0d1830;color:var(--blue);border:1.5px solid var(--blue)}
.pbtn-prep:hover{background:var(--blue);color:#fff}
.pbtn-pron{background:#071a0e;color:var(--green);border:1.5px solid var(--green)}
.pbtn-pron:hover{background:var(--green);color:#111}
.pbtn-reab{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.pbtn-reab:hover{border-color:var(--gold);color:var(--gold)}
.pbtn-del{background:transparent;color:var(--muted);border:1.5px solid var(--border);padding:8px 9px}
.pbtn-del:hover{border-color:var(--red);color:var(--red)}
.pbtn-impr{background:transparent;color:var(--muted);border:1.5px solid var(--border);padding:8px 9px}
.pbtn-impr:hover{border-color:var(--gold);color:var(--gold)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:10px}
.empty p{font-size:15px;font-weight:600}

/* FAB HISTÓRICO */
.fab{
  position:fixed;bottom:20px;right:16px;z-index:200;
  background:var(--gold);color:#111;border:none;border-radius:16px;
  font-family:var(--font);font-size:13px;font-weight:900;
  padding:13px 18px;cursor:pointer;
  box-shadow:0 4px 20px rgba(232,160,32,0.4);
  display:flex;align-items:center;gap:7px;letter-spacing:0.3px;
  transition:all 0.2s;
}
.fab:hover{background:var(--gold2);transform:translateY(-2px)}

/* MODAL HISTÓRICO */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:500;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.sheet{background:var(--surf);border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column;border-top:2px solid var(--gold);animation:su 0.25s ease}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.sheet-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sheet-head h3{font-size:16px;font-weight:900;color:var(--gold);flex:1}
.btn-close{background:var(--card);border:none;border-radius:7px;color:var(--muted);font-size:18px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-body{overflow-y:auto;padding:14px 16px;flex:1}

/* MÉTRICAS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.mv{font-size:20px;font-weight:900;color:var(--gold);line-height:1}
.ml{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.tit{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;margin-top:12px}
.tbrow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.tbwrap{flex:1;background:var(--border);border-radius:3px;height:6px;overflow:hidden}
.tbbar{height:100%;background:var(--gold);border-radius:3px}
.tbnome{font-size:12px;font-weight:700;min-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbqty{font-size:12px;color:var(--gold2);font-weight:900;min-width:26px;text-align:right}
.hp{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:7px}
.hpr{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.hpn{font-size:14px;font-weight:900;color:var(--gold)}
.hpnome{font-size:13px;font-weight:700;flex:1}
.hph{font-size:10px;color:var(--muted)}
.hpt{font-size:13px;font-weight:900;color:var(--gold2)}
.hpi{font-size:11px;color:var(--muted);line-height:1.5}
.hps{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;margin-top:3px}
.hps.aguardando{background:#1f1008;color:var(--orange)}
.hps.preparo{background:#080e1f;color:var(--blue)}
.hps.pronto{background:#071a0e;color:var(--green)}
.hps.cancelado{background:#1f0808;color:#ef4444}
.bexp{background:var(--gold);color:#111;border:none;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:900;padding:11px;cursor:pointer;width:100%;margin-top:10px}
.bclh{background:transparent;border:1.5px solid var(--red);border-radius:8px;color:var(--red);font-family:var(--font);font-size:12px;font-weight:700;padding:9px;cursor:pointer;margin-top:6px;width:100%}
.btn-limp-pron{background:transparent;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:700;padding:9px;cursor:pointer;margin-top:6px;width:100%;transition:all 0.15s}
.btn-limp-pron:hover{border-color:var(--red);color:var(--red)}

/* PRINT */
@media print{
  html,body{margin:0!important;padding:0!important;background:white!important;height:auto!important;overflow:visible!important}
  body>*:not(#print-area){display:none!important}
  #print-area{display:block!important;position:static!important;width:100%!important;background:white!important;color:black!important;margin:0!important;padding:0!important}
  @page{margin:2mm;size:58mm auto}
}
#print-area{display:none;position:fixed;inset:0;z-index:99999;background:white;overflow:auto;padding:6px}

    <p>Point Break · Tempo real</p>
  </div>

<div class="statusbar">
  <div class="stat-chip active" id="chip-todos" onclick="setTab('todos')">
    Todos <span class="badge" id="ct-todos">0</span>
  </div>
  <div class="stat-chip chip-orange" id="chip-aguardando" onclick="setTab('aguardando')">
    🟠 Aguardando <span class="badge" id="ct-aguardando">0</span>
  </div>
  <div class="stat-chip chip-blue" id="chip-preparo" onclick="setTab('preparo')">
    🔵 Preparo <span class="badge" id="ct-preparo">0</span>
  </div>
  <div class="stat-chip chip-green" id="chip-pronto" onclick="setTab('pronto')">
    🟢 Prontos <span class="badge" id="ct-pronto">0</span>
  </div>
</div>

<div class="board" id="board"></div>

<button class="fab" onclick="abrirHist()">📊 Histórico</button>

<!-- MODAL HISTÓRICO -->
<div class="ov" id="ov-hist" onclick="fecharSeOv(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h3>📊 Histórico — <span id="hist-data"></span></h3>
      <button class="btn-close" onclick="fecharHist()">✕</button>
    </div>
    <div class="sheet-body" id="hb"></div>
  </div>
</div>

<div id="print-area"></div>

<script>
let pedidos=[],tabAtiva='todos',timers={};

// ── RELÓGIO ──
function updClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('pt-BR');
}
setInterval(updClock,1000);updClock();

// ── TABS ──
function setTab(t){
  tabAtiva=t;
  document.querySelectorAll('.stat-chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('chip-'+t).classList.add('active');
  renderBoard();
}

// ── RENDER BOARD ──
function renderBoard(){
  const board=document.getElementById('board');
  const list=tabAtiva==='todos'?pedidos:pedidos.filter(p=>p.status===tabAtiva);

  // Atualizar contadores
  document.getElementById('ct-todos').textContent=pedidos.length;
  document.getElementById('ct-aguardando').textContent=pedidos.filter(p=>p.status==='aguardando').length;
  document.getElementById('ct-preparo').textContent=pedidos.filter(p=>p.status==='preparo').length;
  document.getElementById('ct-pronto').textContent=pedidos.filter(p=>p.status==='pronto').length;

  if(!list.length){
    board.innerHTML=`<div class="empty"><div class="empty-icon">✅</div><p>${tabAtiva==='todos'?'Nenhum pedido ainda':'Nenhum pedido nessa categoria'}</p></div>`;
    return;
  }

  // Ordenar: aguardando primeiro, depois preparo, depois pronto; dentro de cada, mais antigo primeiro
  const ordem={'aguardando':0,'preparo':1,'pronto':2};
  const sorted=[...list].sort((a,b)=>{
    const od=(ordem[a.status]||0)-(ordem[b.status]||0);
    return od!==0?od:(a.timestamp||0)-(b.timestamp||0);
  });

  board.innerHTML=sorted.map(p=>renderCard(p)).join('');
  sorted.forEach(p=>startTimer(p));
}

function renderCard(p){
  const sl={'aguardando':'🟠 Aguardando','preparo':'🔵 Em Preparo','pronto':'🟢 Pronto'}[p.status]||'Aguardando';
  const tc=p.entrega==='delivery'?'delivery':'retirada';
  const tl=p.entrega==='delivery'?'🛵 Delivery':'🏠 Retirada';
  const orig=p.origem==='cliente'?'📱 Cliente':'🖥️ Interno';

  const itens=(p.itens||[]).map(it=>{
    let mods='';
    if(it.removed&&it.removed.length) mods+=`<span class="ci-rem">❌ ${it.removed.join(', ')}</span> `;
    if(it.extras&&it.extras.length) mods+=`<span class="ci-add">✅ ${it.extras.map(x=>x.nome).join(', ')}</span>`;
    if(it.acaiAcomp&&it.acaiAcomp.length) mods+=(mods?' · ':'')+`<span style="color:#a78bfa">🫐 ${it.acaiAcomp.join(', ')}</span>`;
    if(it.sabor) mods+=(mods?' · ':'')+`Sabor: ${it.sabor}`;
    if(it.obs) mods+=(mods?'<br>':'')+`<span class="ci-obs">📝 ${it.obs}</span>`;
    return `<div class="ci">
      <span class="ci-qty">${it.qty}x</span>
      <div class="ci-body">
        <div class="ci-nome">${it.nome}</div>
        ${mods?`<div class="ci-mods">${mods}</div>`:''}
      </div>
      <span class="ci-sub">R$&nbsp;${(it.subtotal||0).toFixed(2).replace('.',',')}</span>
    </div>`;
  }).join('');

  const btns=p.status==='aguardando'
    ?`<button class="pbtn pbtn-prep" onclick="setSt('${p.uid}','preparo')">🔵 Iniciar</button>
      <button class="pbtn pbtn-pron" onclick="setSt('${p.uid}','pronto')">🟢 Pronto</button>`
    :p.status==='preparo'
    ?`<button class="pbtn pbtn-pron" onclick="setSt('${p.uid}','pronto')">🟢 Marcar Pronto</button>`
    :`<button class="pbtn pbtn-reab" onclick="setSt('${p.uid}','aguardando')">↩️ Reabrir</button>`;

  return `<div class="pcard ${p.status}" id="pc-${p.uid}">
    <div class="pcard-head">
      <div class="pcard-num">#${p.comanda||'???'}</div>
      <div class="pcard-info">
        <div class="pcard-nome">${p.nome||''}</div>
        <div class="pcard-meta">
          <span class="chip-tipo ${tc}">${tl}</span>
          <span class="chip-origem">${orig}</span>
        </div>
      </div>
      <div class="pcard-hora">${p.hora||''}</div>
    </div>
    <div class="pcard-strip ${p.status}">
      <span class="sdot"></span>
      ${sl}
      <span class="timer" id="timer-${p.uid}">00:00</span>
    </div>
    <div class="pcard-itens">${itens}</div>
    <div class="pcard-foot">
      <span class="pcard-total">Total: R$&nbsp;${(p.total||0).toFixed(2).replace('.',',')}</span>
      ${btns}
      <button class="pbtn pbtn-impr" onclick="imprimir('${p.uid}')">🖨️</button>
      <button class="pbtn pbtn-del" onclick="del('${p.uid}')">✕</button>
    </div>
  </div>`;
}

// ── TIMER ──
function startTimer(p){
  if(timers[p.uid]) clearInterval(timers[p.uid]);
  timers[p.uid]=setInterval(()=>{
    const el=document.getElementById('timer-'+p.uid);
    if(!el){clearInterval(timers[p.uid]);return;}
    const e=Math.floor((Date.now()-(p.timestamp||Date.now()))/1000);
    const m=String(Math.floor(e/60)).padStart(2,'0');
    const s=String(e%60).padStart(2,'0');
    el.textContent=m+':'+s;
    el.classList.toggle('urg',e>900&&p.status!=='pronto');
  },1000);
}

// ── AÇÕES ──
function setSt(uid,status){
  const p=pedidos.find(x=>x.uid===uid);if(!p)return;
  p.status=status;
  if(p._fbKey) fbAtualizarStatus(p._fbKey,status);
  try{
    const h=new Date().toLocaleDateString('pt-BR');
    const k='pb_historico_'+h;
    const r=localStorage.getItem(k);
    if(r){const l=JSON.parse(r);const i=l.find(x=>x.uid===uid);if(i)i.status=status;localStorage.setItem(k,JSON.stringify(l));}
  }catch(e){}
  renderBoard();
}

function del(uid){
  if(!confirm('Remover pedido da fila?'))return;
  const p=pedidos.find(x=>x.uid===uid);
  if(p&&p._fbKey) fbRemoverPedido(p._fbKey);
  pedidos=pedidos.filter(x=>x.uid!==uid);
  if(timers[uid])clearInterval(timers[uid]);
  renderBoard();
}

function limparProntos(){
  if(!confirm('Remover todos os pedidos prontos?'))return;
  fbLimparProntos(pedidos);
  pedidos.filter(p=>p.status==='pronto').forEach(p=>{if(timers[p.uid])clearInterval(timers[p.uid]);});
  pedidos=pedidos.filter(p=>p.status!=='pronto');
  renderBoard();
}

// ── IMPRIMIR ──
function imprimir(uid){
  const p=pedidos.find(x=>x.uid===uid);if(!p)return;
  let linhas='';
  (p.itens||[]).forEach(it=>{
    linhas+=`<div style="display:flex;justify-content:space-between;margin:3px 0"><span>${it.qty}x ${it.nome}</span><span><b>R$ ${(it.subtotal||0).toFixed(2).replace('.',',')}</b></span></div>`;
    if(it.removed&&it.removed.length) linhas+=`<div style="font-size:11px;padding-left:10px;color:#555">❌ Retirar: ${it.removed.join(', ')}</div>`;
    if(it.extras&&it.extras.length) linhas+=`<div style="font-size:11px;padding-left:10px;color:#555">✅ Adicional: ${it.extras.map(x=>x.nome).join(', ')}</div>`;
    if(it.acaiAcomp&&it.acaiAcomp.length) linhas+=`<div style="font-size:11px;padding-left:10px;color:#555">🫐 Acomp: ${it.acaiAcomp.join(', ')}</div>`;
    if(it.sabor) linhas+=`<div style="font-size:11px;padding-left:10px;color:#555">Sabor: ${it.sabor}</div>`;
    if(it.obs) linhas+=`<div style="font-size:11px;padding-left:10px;color:#555;font-style:italic">📝 ${it.obs}</div>`;
  });
  if((p.frete||0)>0) linhas+=`<div style="display:flex;justify-content:space-between;margin:3px 0"><span>🛵 Frete</span><span>R$ ${p.frete.toFixed(2).replace('.',',')}</span></div>`;

  const pa=document.getElementById('print-area');
  pa.innerHTML=`<div style="font-family:'Courier New',monospace;font-size:11px;color:#000;background:#fff;padding:4px;width:54mm;margin:0 auto">
    <div style="text-align:center;margin-bottom:10px">
      <div style="font-size:14px;font-weight:900;letter-spacing:1px">POINT BREAK</div>
      <div style="font-size:11px;color:#444">CARNAPIN — LANCHERIA</div>
      <div style="border-top:2px solid #000;margin:8px 0"></div>
      <div style="font-size:20px;font-weight:900;letter-spacing:2px">COMANDA #${p.comanda||'???'}</div>
      <div style="font-size:11px;color:#444">${new Date().toLocaleDateString('pt-BR')} | ${p.hora||''}</div>
    </div>
    <div style="border-top:1px dashed #000;margin:8px 0"></div>
    <div style="display:flex;justify-content:space-between;margin:3px 0"><span style="color:#444">Cliente</span><span style="font-weight:700">${p.nome||''}</span></div>
    ${p.tel?`<div style="display:flex;justify-content:space-between;margin:3px 0"><span style="color:#444">Tel</span><span>${p.tel}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;margin:3px 0"><span style="color:#444">Entrega</span><span style="font-weight:700">${p.entrega==='delivery'?'🛵 Delivery':'🏠 Retirada'}</span></div>
    ${p.entrega==='delivery'?`<div style="display:flex;justify-content:space-between;margin:3px 0"><span style="color:#444">Endereço</span><span>${p.end||''}${p.bairro?', '+p.bairro:''}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;margin:3px 0"><span style="color:#444">Pagamento</span><span style="font-weight:700">${p.pagto||''}</span></div>
    <div style="border-top:2px solid #000;margin:10px 0 6px;font-weight:900;font-size:13px;letter-spacing:1px">ITENS DO PEDIDO</div>
    ${linhas}
    <div style="border-top:3px solid #000;margin:12px 0 8px"></div>
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:16px;font-weight:900">TOTAL</span>
      <span style="font-size:22px;font-weight:900">R$ ${(p.total||0).toFixed(2).replace('.',',')}</span>
    </div>
    <div style="border-top:1px dashed #000;margin:12px 0 6px;text-align:center;font-size:11px;color:#666">Obrigado pela preferência!<br>@pointbreaklanches</div>
  </div>`;
  pa.style.display='block';
  setTimeout(()=>{window.print();setTimeout(()=>{pa.style.display='none';},800);},100);
}

// ── HISTÓRICO ──
function getHist(){
  try{const h=new Date().toLocaleDateString('pt-BR');const r=localStorage.getItem('pb_historico_'+h);return r?JSON.parse(r):[];}catch(e){return[];}
}

function cancelarHistorico(uid) {
  if (!confirm('Marcar pedido como CANCELADO?')) return;
  var h = new Date().toLocaleDateString('pt-BR');
  var k = 'pb_historico_' + h;
  try {
    var lista = JSON.parse(localStorage.getItem(k) || '[]');
    var p = lista.find(function(x) { return x.uid === uid; });
    if (p) {
      p.status = 'cancelado';
      localStorage.setItem(k, JSON.stringify(lista));
      // Also update Firebase if key exists
      if (p._fbKey) fbAtualizarStatus(p._fbKey, 'cancelado');
    }
  } catch(e) {}
  abrirHist();
  showToastCoz('⚠️ Pedido marcado como cancelado');
}

function excluirHistorico(uid) {
  if (!confirm('Excluir este pedido do histórico?')) return;
  var h = new Date().toLocaleDateString('pt-BR');
  var k = 'pb_historico_' + h;
  try {
    var lista = JSON.parse(localStorage.getItem(k) || '[]');
    var p = lista.find(function(x) { return x.uid === uid; });
    lista = lista.filter(function(x) { return x.uid !== uid; });
    localStorage.setItem(k, JSON.stringify(lista));
    // Also remove from Firebase
    if (p && p._fbKey) fbRemoverPedido(p._fbKey);
    // Remove from active queue too
    pedidos = pedidos.filter(function(x) { return x.uid !== uid; });
  } catch(e) {}
  abrirHist();
  renderBoard();
  showToastCoz('🗑️ Pedido excluído');
}

function abrirHist(){
  const hoje=new Date().toLocaleDateString('pt-BR');
  document.getElementById('hist-data').textContent=hoje;
  const lista=getHist();
  const hb=document.getElementById('hb');
  if(!lista.length){hb.innerHTML='<p style="text-align:center;color:var(--muted);padding:30px">Nenhum pedido hoje.</p>';document.getElementById('ov-hist').classList.add('show');return;}
  const tg=lista.reduce((s,p)=>s+(p.total||0),0);
  const ti=lista.reduce((s,p)=>s+(p.itens||[]).reduce((x,i)=>x+(i.qty||0),0),0);
  const td=lista.filter(p=>p.entrega==='delivery').length;
  const ic={};lista.forEach(p=>(p.itens||[]).forEach(it=>{ic[it.nome]=(ic[it.nome]||0)+(it.qty||0);}));
  const top=Object.entries(ic).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const mx=top[0]?.[1]||1;
  const pg={};lista.forEach(p=>{pg[p.pagto||'?']=(pg[p.pagto||'?']||0)+1;});
  hb.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="mv">R$&nbsp;${tg.toFixed(2).replace('.',',')}</div><div class="ml">Total</div></div>
      <div class="metric"><div class="mv">${lista.length}</div><div class="ml">Pedidos</div></div>
      <div class="metric"><div class="mv">R$&nbsp;${(tg/lista.length).toFixed(2).replace('.',',')}</div><div class="ml">Ticket</div></div>
      <div class="metric"><div class="mv">${ti}</div><div class="ml">Itens</div></div>
      <div class="metric"><div class="mv">${td}</div><div class="ml">Delivery</div></div>
      <div class="metric"><div class="mv">${lista.length-td}</div><div class="ml">Retirada</div></div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:4px">Pagamentos: ${Object.entries(pg).map(([k,v])=>k+': '+v).join(' · ')}</p>
    <div class="tit">🏆 Mais pedidos</div>
    ${top.map(([n,q])=>`<div class="tbrow"><span class="tbnome">${n}</span><div class="tbwrap"><div class="tbbar" style="width:${Math.round(q/mx*100)}%"></div></div><span class="tbqty">${q}x</span></div>`).join('')}
    <div class="tit">📋 Pedidos do Dia</div>
    ${lista.slice().reverse().map(p=>`<div class="hp" id="hp-${p.uid}">
      <div class="hpr">
        <span class="hpn">#${p.comanda}</span>
        <span class="hpnome">${p.nome}</span>
        <span class="hph">${p.hora}</span>
        <span class="hpt">R$ ${(p.total||0).toFixed(2).replace('.',',')}</span>
      </div>
      <div class="hpi">${(p.itens||[]).map(i=>i.qty+'x '+i.nome).join(' · ')}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap">
        <span class="hps ${p.status}">${p.status==='aguardando'?'Aguardando':p.status==='preparo'?'Preparo':p.status==='cancelado'?'Cancelado':'Pronto'}</span>
        <span class="hps ${p.origem||'interno'}" style="background:#0a1a2e;color:#3b82f6">${p.origem==='cliente'?'📱 Cliente':'🖥️ Interno'}</span>
        <div style="margin-left:auto;display:flex;gap:5px">
          <button onclick="cancelarHistorico('${p.uid}')" style="background:#1f1008;border:1.5px solid #f97316;border-radius:7px;color:#f97316;font-size:11px;font-weight:700;padding:4px 9px;cursor:pointer">⚠️ Cancelar</button>
          <button onclick="excluirHistorico('${p.uid}')" style="background:#1f0808;border:1.5px solid #ef4444;border-radius:7px;color:#ef4444;font-size:11px;font-weight:700;padding:4px 9px;cursor:pointer">✕ Excluir</button>
        </div>
      </div>
    </div>`).join('')}
    <button class="bexp" onclick="exportCSV()">📥 Exportar CSV</button>
    <button class="btn-limp-pron" onclick="limparProntos()">🗑️ Limpar prontos da fila</button>
    <button class="bclh" onclick="limparHist()">🗑️ Limpar histórico do dia</button>`;
  document.getElementById('ov-hist').classList.add('show');
}
function fecharHist(){document.getElementById('ov-hist').classList.remove('show');}
function fecharSeOv(e){if(e.target===document.getElementById('ov-hist'))fecharHist();}
function exportCSV(){
  const h=new Date().toLocaleDateString('pt-BR');
  const lista=getHist();
  let csv='Comanda,Cliente,Hora,Entrega,Pagamento,Itens,Total\n';
  lista.forEach(p=>{csv+=`"#${p.comanda}","${p.nome}","${p.hora}","${p.entrega||''}","${p.pagto||''}","${(p.itens||[]).map(i=>i.qty+'x '+i.nome).join(' | ')}","R$ ${(p.total||0).toFixed(2)}"\n`;});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='pointbreak_'+h.replace(/\//g,'-')+'.csv';a.click();
}
function limparHist(){
  if(!confirm('Apagar histórico de hoje?'))return;
  localStorage.removeItem('pb_historico_'+new Date().toLocaleDateString('pt-BR'));
  fecharHist();
}

// ── FIREBASE LISTENER ──

// ===== SOM DE ALERTA =====
function tocarAlerta() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, start, dur) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      o.type = 'square';
      g.gain.setValueAtTime(0.3, ctx.currentTime + start);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      o.start(ctx.currentTime + start);
      o.stop(ctx.currentTime + start + dur + 0.05);
    }
    beep(880, 0, 0.12);
    beep(1100, 0.15, 0.12);
    beep(1320, 0.30, 0.20);
  } catch(e) { console.warn('Audio:', e); }
}

// ===== IMPRESSÃO AUTOMÁTICA =====
var autoPrintEnabled = localStorage.getItem('pb_autoprint') !== 'false';
var pedidosConhecidos = new Set();

function toggleAutoPrint() {
  autoPrintEnabled = !autoPrintEnabled;
  localStorage.setItem('pb_autoprint', autoPrintEnabled ? 'true' : 'false');
  var btn = document.getElementById('btn-autoprint');
  if (autoPrintEnabled) {
    btn.textContent = '🖨️ Auto ON';
    btn.style.borderColor = '#22c55e';
    btn.style.color = '#22c55e';
    btn.style.background = '#071a0e';
    showToastCoz('✅ Impressão automática ativada');
  } else {
    btn.textContent = '🖨️ Auto OFF';
    btn.style.borderColor = '#ef4444';
    btn.style.color = '#ef4444';
    btn.style.background = '#1f0808';
    showToastCoz('🔇 Impressão automática desativada');
  }
}

function showToastCoz(msg) {
  var t = document.getElementById('toast-coz');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast-coz';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e2127;border:1.5px solid var(--gold);color:var(--text);font-weight:700;font-size:13px;padding:10px 20px;border-radius:20px;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.5);display:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2500);
}

function iniciarAutoprint() {
  var btn = document.getElementById('btn-autoprint');
  if (btn) {
    if (!autoPrintEnabled) {
      btn.textContent = '🖨️ Auto OFF';
      btn.style.borderColor = '#ef4444';
      btn.style.color = '#ef4444';
      btn.style.background = '#1f0808';
    }
  }
}

function imprimirAutomatico(p) {
  // Gera o HTML da comanda e imprime
  var linhas = '';
  (p.itens || []).forEach(function(it) {
    linhas += '<div style="display:flex;justify-content:space-between;margin:2px 0"><span>' + it.qty + 'x ' + it.nome + '</span><span><b>R$ ' + (it.subtotal||0).toFixed(2).replace('.',',') + '</b></span></div>';
    if (it.removed && it.removed.length) linhas += '<div style="font-size:10px;padding-left:8px;color:#555">❌ ' + it.removed.join(', ') + '</div>';
    if (it.extras && it.extras.length) linhas += '<div style="font-size:10px;padding-left:8px;color:#555">✅ ' + it.extras.map(function(x){return x.nome;}).join(', ') + '</div>';
    if (it.acaiAcomp && it.acaiAcomp.length) linhas += '<div style="font-size:10px;padding-left:8px;color:#555">🫐 ' + it.acaiAcomp.join(', ') + '</div>';
    if (it.sabor) linhas += '<div style="font-size:10px;padding-left:8px;color:#555">Sabor: ' + it.sabor + '</div>';
    if (it.obs) linhas += '<div style="font-size:10px;padding-left:8px;color:#555;font-style:italic">📝 ' + it.obs + '</div>';
  });
  if ((p.frete||0) > 0) linhas += '<div style="display:flex;justify-content:space-between;margin:2px 0"><span>🛵 Frete</span><span>R$ ' + p.frete.toFixed(2).replace('.',',') + '</span></div>';

  var comanda = String(p.comanda || '???').padStart(3,'0');
  var receipt =
    '<div style="font-family:Courier New,monospace;font-size:11px;color:#000;background:#fff;padding:4px;width:54mm">' +
    '<div style="text-align:center;margin-bottom:8px">' +
      '<div style="font-size:13px;font-weight:900;letter-spacing:1px">POINT BREAK</div>' +
      '<div style="font-size:9px;color:#444">CARNAPIN — LANCHERIA</div>' +
      '<div style="border-top:2px solid #000;margin:5px 0"></div>' +
      '<div style="font-size:18px;font-weight:900;letter-spacing:2px">PEDIDO #' + comanda + '</div>' +
      '<div style="font-size:9px;color:#444">' + new Date().toLocaleDateString('pt-BR') + ' | ' + (p.hora||'') + '</div>' +
      '<div style="font-size:10px;font-weight:700;color:#000;margin-top:3px">📱 PEDIDO ONLINE</div>' +
    '</div>' +
    '<div style="border-top:1px dashed #000;margin:5px 0"></div>' +
    '<div style="display:flex;justify-content:space-between;margin:2px 0"><span style="color:#444">Cliente</span><span style="font-weight:700">' + (p.nome||'') + '</span></div>' +
    (p.tel ? '<div style="display:flex;justify-content:space-between;margin:2px 0"><span style="color:#444">Tel</span><span>' + p.tel + '</span></div>' : '') +
    '<div style="display:flex;justify-content:space-between;margin:2px 0"><span style="color:#444">Entrega</span><span style="font-weight:700">' + (p.entrega==='delivery'?'🛵 Delivery':'🏠 Retirada') + '</span></div>' +
    (p.entrega==='delivery' ? '<div style="display:flex;justify-content:space-between;margin:2px 0"><span style="color:#444">Endereço</span><span>' + (p.end||'') + (p.bairro?', '+p.bairro:'') + '</span></div>' : '') +
    '<div style="display:flex;justify-content:space-between;margin:2px 0"><span style="color:#444">Pagamento</span><span style="font-weight:700">' + (p.pagto||'') + '</span></div>' +
    '<div style="border-top:2px solid #000;margin:6px 0 4px;font-weight:900;font-size:11px">ITENS</div>' +
    linhas +
    '<div style="border-top:3px solid #000;margin:6px 0 4px"></div>' +
    '<div style="display:flex;justify-content:space-between">' +
      '<span style="font-size:13px;font-weight:900">TOTAL</span>' +
      '<span style="font-size:17px;font-weight:900">R$ ' + (p.total||0).toFixed(2).replace('.',',') + '</span>' +
    '</div>' +
    '<div style="border-top:1px dashed #000;margin:6px 0 4px;text-align:center;font-size:9px;color:#666">Obrigado! @pointbreaklanches</div>' +
    '</div>';

  var pa = document.getElementById('print-area');
  pa.innerHTML = receipt;
  pa.style.display = 'block';
  setTimeout(function() {
    window.print();
    setTimeout(function() { pa.style.display = 'none'; }, 1000);
  }, 300);
}

function verificarNovosPedidos(lista) {
  lista.forEach(function(p) {
    // Só pedidos do app cliente
    if (p.origem !== 'cliente') return;
    // Só pedidos novos (não vistos antes)
    if (pedidosConhecidos.has(p.uid)) return;
    pedidosConhecidos.add(p.uid);
    // Tocar alerta
    tocarAlerta();
    // Notificação visual
    showToastCoz('📱 Novo pedido #' + String(p.comanda||'???').padStart(3,'0') + ' — ' + (p.nome||''));
    // Imprimir automaticamente se ativado
    if (autoPrintEnabled) {
      setTimeout(function() { imprimirAutomatico(p); }, 800);
    }
  });
}


window.addEventListener('load',function(){
  iniciarAutoprint();
  fbOuvirPedidos(function(lista){
    pedidos=lista;
    verificarNovosPedidos(lista);
    // Salvar no histórico local
    lista.forEach(p=>{
      try{
        const h=new Date().toLocaleDateString('pt-BR');
        const k='pb_historico_'+h;
        const raw=localStorage.getItem(k);
        const hist=raw?JSON.parse(raw):[];
        if(!hist.find(x=>x.uid===p.uid)){hist.push(p);localStorage.setItem(k,JSON.stringify(hist));}
        else{const i=hist.findIndex(x=>x.uid===p.uid);if(i>=0){hist[i]=p;localStorage.setItem(k,JSON.stringify(hist));}}
      }catch(e){}
    });
    renderBoard();
  });
});
</script>
